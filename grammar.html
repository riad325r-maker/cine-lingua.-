<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="grammarTitle">CineLingua | قواعد الجرامر</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6366f1">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/J4xdc62M/20260305-233826.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <!-- PAGE HEADER -->
        <div class="page-header">
            <h1 id="page-title-el" data-i18n="grammarTitle">قواعد الجرامر</h1>
            <div class="quick-stats">
                <div class="quick-stat"><i class="fas fa-book"></i><span><span class="qs-val" id="totalCount">0</span> <span data-i18n="lbl-total">قاعدة</span></span></div>
                <div class="quick-stat"><i class="fas fa-check-circle"></i><span><span class="qs-val" id="learnedCount">0</span> <span data-i18n="lbl-learned">مكتملة</span></span></div>
                <div class="quick-stat"><i class="fas fa-bookmark"></i><span><span class="qs-val" id="savedCount">0</span> <span data-i18n="lbl-saved">محفوظة</span></span></div>
            </div>
        </div>

        <!-- DAILY RULE -->
        <div class="daily-banner">
            <span class="daily-tag" data-i18n="daily-tag">قاعدة اليوم</span>
            <span class="daily-title" id="dailyTitle">—</span>
            <span class="daily-sub" id="dailySub"></span>
            <button class="daily-btn" onclick="listenDaily()"><i class="fas fa-volume-up"></i> <span data-i18n="daily-listen">استمع للمثال</span></button>
            <button class="daily-btn" onclick="learnDaily()"><i class="fas fa-check"></i> <span data-i18n="daily-learned">تعلمتها</span></button>
        </div>

        <!-- SEARCH -->
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" data-i18n-placeholder="search-placeholder" placeholder="ابحث عن قاعدة...">
        </div>

        <!-- FILTERS -->
        <div class="filters-container">
            <div class="filter-row">
                <div class="filter-group">
                    <span class="filter-label" data-i18n="lbl-topic">الموضوع:</span>
                    <div class="filter-tabs" id="catFilters">
                        <button class="filter-tab active" onclick="setCat('all',this)" data-i18n="cat-all">الكل</button>
                        <button class="filter-tab" onclick="setCat('tenses',this)">⏰ الأزمنة</button>
                        <button class="filter-tab" onclick="setCat('articles',this)">📖 المعرّف</button>
                        <button class="filter-tab" onclick="setCat('prepositions',this)">🔗 حروف الجر</button>
                        <button class="filter-tab" onclick="setCat('conditionals',this)">🔀 الشرط</button>
                        <button class="filter-tab" onclick="setCat('modal',this)">⚡ مساعدة</button>
                        <button class="filter-tab" onclick="setCat('pronouns',this)">👤 الضمائر</button>
                        <button class="filter-tab" onclick="setCat('questions',this)">❓ الأسئلة</button>
                        <button class="filter-tab" onclick="setCat('adjectives',this)">🎨 الصفات</button>
                        <button class="filter-tab" onclick="setCat('passive',this)">🔄 مجهول</button>
                        <button class="filter-tab" onclick="setCat('gerund',this)">🔧 Gerund</button>
                        <button class="filter-tab" onclick="setCat('nouns',this)">🔢 الأسماء</button>
                    </div>
                </div>
                <div class="action-btns-row">
                    <button class="saved-btn" onclick="showSaved()">
                        <i class="fas fa-bookmark"></i> <span data-i18n="btn-saved-list">المحفوظات</span>
                        <span class="saved-badge" id="savedBadge">0</span>
                    </button>
                    <button class="saved-btn green" onclick="showLearned()">
                        <i class="fas fa-check-circle"></i> <span data-i18n="btn-learned-list">المكتملة</span>
                        <span class="saved-badge" id="learnedBadge">0</span>
                    </button>
                </div>
            </div>
            <div class="filter-row">
                <div class="filter-group">
                    <span class="filter-label" data-i18n="lbl-level">المستوى:</span>
                    <div class="filter-tabs">
                        <button class="level-tab active" onclick="setLevel('all',this)" data-i18n="lvl-all">الكل</button>
                        <button class="level-tab" onclick="setLevel('مبتدئ',this)" data-i18n="lvl-beg">مبتدئ</button>
                        <button class="level-tab" onclick="setLevel('متوسط',this)" data-i18n="lvl-mid">متوسط</button>
                        <button class="level-tab" onclick="setLevel('متقدم',this)" data-i18n="lvl-adv">متقدم</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- GRID -->
        <div class="grammar-grid" id="grammarGrid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 1.2rem;"></div>
    </div>

    <!-- TOAST -->
    <div class="toast-container" id="toastContainer"></div>
    <button class="scroll-top" id="scrollTop" onclick="window.scrollTo({top:0,behavior:'smooth'})"><i class="fas fa-arrow-up"></i></button>

    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-messaging-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
    <script src="grammar-data.js"></script>
    <script src="translation.js"></script>
    <script src="core.js"></script>
    <script>
        let savedRules   = JSON.parse(localStorage.getItem('savedRules'))   || [];
        let learnedRules = JSON.parse(localStorage.getItem('learnedRules')) || [];
        let currentCat   = 'all';
        let currentLevel = 'all';
        let currentSearch = '';
        let viewingSaved  = false;
        let viewingLearned = false;
        let displayData   = [];
        let dailyRule     = null;
        let selectedVoice = null;

        function loadVoices() {
            const v = window.speechSynthesis.getVoices();
            selectedVoice = v.find(x=>x.lang==='en-US'&&x.name.toLowerCase().includes('google')) || v.find(x=>x.lang==='en-US') || v[0];
        }
        window.speechSynthesis.onvoiceschanged = loadVoices;
        if (window.speechSynthesis.getVoices().length > 0) loadVoices();

        function speak(text, rate=1.0) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(text); u.lang='en-US'; u.rate=rate; u.pitch=1; u.volume=1;
            if(selectedVoice) u.voice=selectedVoice; window.speechSynthesis.speak(u);
        }

        function setDailyRule() {
            dailyRule = GRAMMAR_DATA[Math.floor(Date.now()/86400000) % GRAMMAR_DATA.length];
            document.getElementById('dailyTitle').textContent = dailyRule.title;
            document.getElementById('dailySub').textContent   = dailyRule.sub;
        }

        function listenDaily() { if(!dailyRule) return; speak(dailyRule.title + '. ' + (dailyRule.examples[0]?.en || '')); }
        function learnDaily() { if(!dailyRule) return; markLearned(dailyRule.id); showToast(t('toast-daily'), 'success'); }

        function setCat(c, btn) { if(viewingSaved||viewingLearned) exitSpecial(); currentCat = c; document.querySelectorAll('#catFilters .filter-tab').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); applyFilters(); }
        function setLevel(l, btn) { if(viewingSaved||viewingLearned) exitSpecial(); currentLevel = l; document.querySelectorAll('.level-tab').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); applyFilters(); }

        function applyFilters() {
            let data = [...GRAMMAR_DATA];
            if(currentCat !== 'all') data = data.filter(g=>g.cat===currentCat);
            if(currentLevel !== 'all') data = data.filter(g=>g.tags.includes(currentLevel));
            if(currentSearch.length >= 1) { const q = currentSearch.toLowerCase(); data = data.filter(g=>g.title.toLowerCase().includes(q)||g.sub.includes(q)||g.rule.includes(q)); }
            displayData = data; renderGrid();
        }

        function renderGrid() {
            const grid = document.getElementById('grammarGrid'); updateCounts();
            if(!displayData.length) { grid.innerHTML = `<div class="no-results"><i class="fas fa-search" style="font-size:2rem;margin-bottom:0.5rem;display:block;"></i>${t('no-results')}</div>`; return; }
            grid.innerHTML = displayData.map(g => {
                const isSaved = savedRules.includes(g.id); const isLearned = learnedRules.includes(g.id);
                return `<div class="cl-card grammar-card ${isSaved?'saved':''} ${isLearned?'learned':''}" style="padding: 1.3rem;">
                    <div style="position: absolute; top: 0; right: 0; width: 4px; height: 100%; border-radius: 0 1.2rem 1.2rem 0; background:${g.color}"></div>
                    <span class="learned-ribbon" style="position: absolute; top: 10px; left: 10px; background: var(--gradient); color: white; font-size: 0.66rem; font-weight: 700; padding: 0.18rem 0.55rem; border-radius: 100px; display: ${isLearned ? 'inline-block' : 'none'};">${t('learned-lbl')}</span>
                    <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.75rem;">
                        <div><div style="font-size: 1.6rem; font-weight: 800; line-height: 1; color:${g.color}">${g.title}</div><div style="font-size: 0.82rem; color: var(--text-secondary); font-weight: 600;">${g.sub}</div></div>
                    </div>
                    <div style="display: flex; gap: 0.35rem; margin-bottom: 0.75rem; flex-wrap: wrap;">${g.tags.map(t_tag=>`<span style="font-size: 0.68rem; font-weight: 700; padding: 0.18rem 0.55rem; border-radius: 100px; background: var(--bg-secondary); color: var(--text-secondary);">${t_tag}</span>`).join('')}</div>
                    <div style="background: var(--bg-secondary); padding: 0.6rem 0.9rem; border-radius: 0.75rem; margin-bottom: 0.85rem; font-size: 0.82rem; font-weight: 700; color: var(--primary); direction: ltr; text-align: left; border-right: 3px solid var(--primary); font-family: monospace;">${g.formula}</div>
                    <div style="font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.85rem; line-height: 1.7;">${g.rule}</div>
                    <div style="display: flex; flex-direction: column; gap: 0.45rem; margin-bottom: 0.85rem;">${g.examples.map(ex=>`<div style="background: var(--bg-secondary); border-radius: 0.7rem; padding: 0.65rem 0.9rem;"><div style="font-weight: 600; font-size: 0.88rem; color: var(--text-primary); direction: ltr; text-align: left;">"${ex.en}"</div><div style="font-size: 0.78rem; color: var(--text-secondary); margin-top: 0.2rem;">${ex.ar}</div></div>`).join('')}</div>
                    <div class="card-actions">
                        <button class="action-btn listen" onclick="speak('${(g.title + '. ' + (g.examples[0]?.en||'')).replace(/'/g,"\\'")}')"><i class="fas fa-volume-up"></i> ${t('btn-listen')}</button>
                        <button class="action-btn listen-slow" onclick="speak('${(g.title + '. ' + (g.examples[0]?.en||'')).replace(/'/g,"\\'")}',0.6)"><i class="fas fa-ear-listen"></i> ${t('btn-listen-slow')}</button>
                        <button class="action-btn save-btn ${isSaved?'active':''}" onclick="toggleSave(${g.id})"><i class="fas fa-bookmark"></i> ${isSaved?t('btn-saved'):t('btn-save')}</button>
                        <button class="action-btn learn-btn ${isLearned?'active':''}" onclick="markLearned(${g.id})"><i class="fas fa-${isLearned?'check-circle':'graduation-cap'}"></i> ${isLearned?t('btn-learned'):t('btn-learn')}</button>
                    </div>
                </div>`;
            }).join('');
        }

        function toggleSave(id) { const was = savedRules.includes(id); savedRules = was ? savedRules.filter(x=>x!==id) : [...savedRules,id]; localStorage.setItem('savedRules', JSON.stringify(savedRules)); showToast(was?t('toast-unsaved'):t('toast-saved'), was?'warning':'success'); viewingSaved ? showSaved() : renderGrid(); }
        function markLearned(id) { const was = learnedRules.includes(id); learnedRules = was ? learnedRules.filter(x=>x!==id) : [...learnedRules,id]; localStorage.setItem('learnedRules', JSON.stringify(learnedRules)); showToast(was?t('toast-unlearned'):t('toast-learned'), was?'info':'success'); viewingLearned ? showLearned() : renderGrid(); }

        function showSaved() { viewingSaved=true; viewingLearned=false; const data = GRAMMAR_DATA.filter(g=>savedRules.includes(g.id)); if(!data.length){ document.getElementById('grammarGrid').innerHTML=`<div class="empty-state"><i class="fas fa-bookmark"></i><h3>${t('empty-saved-h')}</h3><p>${t('empty-saved-p')}</p><button class="back-btn" onclick="exitSpecial()">${t('btn-back')}</button></div>`; return; } displayData=data; renderGrid(); }
        function showLearned() { viewingLearned=true; viewingSaved=false; const data = GRAMMAR_DATA.filter(g=>learnedRules.includes(g.id)); if(!data.length){ document.getElementById('grammarGrid').innerHTML=`<div class="empty-state"><i class="fas fa-graduation-cap"></i><h3>${t('empty-learned-h')}</h3><p>${t('empty-learned-p')}</p><button class="back-btn" onclick="exitSpecial()">${t('btn-back')}</button></div>`; return; } displayData=data; renderGrid(); }
        function exitSpecial(){viewingSaved=false;viewingLearned=false;applyFilters();}

        function updateCounts() { document.getElementById('totalCount').textContent = GRAMMAR_DATA.length; document.getElementById('savedCount').textContent = savedRules.length; document.getElementById('learnedCount').textContent = learnedRules.length; }
        function showToast(msg, type='info') { const tc = document.getElementById('toastContainer'); const el = document.createElement('div'); el.className=`toast ${type}`; el.innerHTML=`<i class="fas fa-${type==='success'?'check':type==='warning'?'times':'info-circle'}"></i> ${msg}`; tc.appendChild(el); setTimeout(()=>{el.style.animation='toastOut 0.3s ease forwards';setTimeout(()=>el.remove(),300);},2200); }

        document.getElementById('searchInput').addEventListener('input',e=>{ if(viewingSaved||viewingLearned)exitSpecial(); currentSearch=e.target.value; applyFilters(); });
        window.addEventListener('scroll',()=>{ document.getElementById('scrollTop').classList.toggle('show',window.scrollY>400); });
        window.addEventListener('languageChanged', renderGrid);

        setDailyRule(); applyFilters();
    </script>
</body>
</html>
