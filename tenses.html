<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="tensesTitle">CineLingua | الأزمنة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="page-header">
            <h1 data-i18n="tensesTitle">الأزمنة في الإنجليزية</h1>
            <div class="quick-stats">
                <div class="quick-stat"><i class="fas fa-clock"></i><span><b id="totalTenses">0</b> <span data-i18n="tenses-count">زمن</span></span></div>
                <div class="quick-stat"><i class="fas fa-bookmark"></i><span><b id="savedCount">0</b> <span data-i18n="saved">محفوظة</span></span></div>
            </div>
        </div>

        <div class="filters-container">
            <div class="filter-row">
                <div class="filter-group">
                    <span class="filter-label" data-i18n="lbl-level">المستوى:</span>
                    <div class="filter-tabs" id="levelFilters">
                        <button class="filter-tab active" onclick="filterByLevel('all')" data-i18n="all">الكل</button>
                        <button class="filter-tab" onclick="filterByLevel('beginner')" data-i18n="ft-beg">مبتدئ</button>
                        <button class="filter-tab" onclick="filterByLevel('intermediate')" data-i18n="ft-int">متوسط</button>
                        <button class="filter-tab" onclick="filterByLevel('advanced')" data-i18n="ft-adv">متقدم</button>
                    </div>
                </div>
                <button class="saved-btn" id="savedBtn" onclick="showSavedTenses()">
                    <i class="fas fa-bookmark"></i> <span data-i18n="saved">المحفوظة</span>
                    <span class="saved-badge" id="savedBadge">0</span>
                </button>
            </div>
        </div>

        <div class="tenses-grid" id="tensesGrid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.2rem;"></div>

        <div class="pagination-container" id="paginationContainer">
            <div class="pagination-controls">
                <button class="page-btn" onclick="changePage('prev')" id="prevBtn" disabled>
                    <i class="fas fa-chevron-right"></i> <span data-i18n="btn-prev">السابق</span>
                </button>
                <div class="page-numbers" id="pageNumbers"></div>
                <button class="page-btn" onclick="changePage('next')" id="nextBtn">
                    <span data-i18n="btn-next">التالي</span> <i class="fas fa-chevron-left"></i>
                </button>
            </div>
            <div class="page-info" id="pageInfo"></div>
        </div>
    </div>

    <!-- TENSE MODAL -->
    <div class="tense-modal" id="tenseModal" style="position: fixed; inset: 0; background: var(--bg-primary); z-index: 2000; opacity: 0; visibility: hidden; transition: opacity 0.3s; overflow-y: auto;">
        <div class="modal-container" id="modalContainer"></div>
    </div>

    <div class="toast-container" id="toastContainer"></div>
    <button class="scroll-top" id="scrollTop" onclick="window.scrollTo({top:0,behavior:'smooth'})"><i class="fas fa-arrow-up"></i></button>

    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-messaging-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
    <script src="tenses-data.js"></script>
    <script src="translation.js"></script>
    <script src="core.js"></script>
    <script>
        let savedTenses          = JSON.parse(localStorage.getItem('savedTenses')) || [];
        let currentLevel         = 'all';
        let viewingSaved         = false;
        let currentTense         = null;
        let userAnswers          = {};
        let currentPage          = 1;
        const itemsPerPage       = 6;
        let totalPages           = 1;
        let currentDisplayTenses = [];

        document.addEventListener('DOMContentLoaded', () => {
            updateCounts(); applyFilters();
            window.addEventListener('scroll', () => {
                document.getElementById('scrollTop').classList.toggle('show', window.scrollY > 400);
            });
            window.addEventListener('languageChanged', renderGrid);
        });

        function updateCounts() {
            const total = (typeof TENSES_DATA !== 'undefined') ? TENSES_DATA.length : 0;
            document.getElementById('totalTenses').textContent = total;
            document.getElementById('savedCount').textContent  = savedTenses.length;
            document.getElementById('savedBadge').textContent  = savedTenses.length;
        }

        function filterByLevel(level) {
            if (viewingSaved) exitSavedView();
            currentLevel = level;
            document.querySelectorAll('#levelFilters .filter-tab').forEach(t => {
                const keys = { all: 'all', beginner: 'ft-beg', intermediate: 'ft-int', advanced: 'ft-adv' };
                t.classList.toggle('active', t.getAttribute('data-i18n') === keys[level]);
            });
            applyFilters();
        }

        function applyFilters() {
            if (viewingSaved) { showSavedTenses(); return; }
            const data = (typeof TENSES_DATA !== 'undefined') ? TENSES_DATA : [];
            currentDisplayTenses = currentLevel === 'all' ? data : data.filter(t => t.level === currentLevel);
            currentPage = 1; renderGrid(); updatePagination();
        }

        function renderGrid() {
            const grid = document.getElementById('tensesGrid');
            if (!currentDisplayTenses.length) {
                grid.innerHTML = `<div class="no-results"><i class="fas fa-search"></i><span data-i18n="no-results">لا توجد أزمنة مطابقة</span></div>`;
                document.getElementById('paginationContainer').style.display = 'none'; return;
            }
            document.getElementById('paginationContainer').style.display = 'flex';
            const start = (currentPage - 1) * itemsPerPage;
            const end   = Math.min(start + itemsPerPage, currentDisplayTenses.length);

            grid.innerHTML = currentDisplayTenses.slice(start, end).map(tense => {
                const isSaved = savedTenses.includes(tense.id);
                const kws = tense.keywords?.slice(0,4).map(k => `<span class="keyword" style="background: var(--bg-secondary); padding: 0.18rem 0.55rem; border-radius: 100px; font-size: 0.7rem; color: var(--text-secondary); font-weight: 500;">${k}</span>`).join('') || '';
                return `
                <div class="cl-card tense-card ${isSaved ? 'saved' : ''}">
                    <div style="padding: 1.1rem 1.2rem; background: var(--gradient); color: white; display: flex; align-items: center; gap: 0.75rem;">
                        <span style="font-size: 1.8rem;">${tense.icon || '<i class="fas fa-clock"></i>'}</span>
                        <div>
                            <div style="font-size: 1.1rem; font-weight: 800;">${tense.name}</div>
                            <div style="font-size: 0.82rem; opacity: 0.88;">${tense.nameAr}</div>
                        </div>
                    </div>
                    <div style="padding: 1.1rem;">
                        <div style="background: var(--bg-secondary); padding: 0.65rem 0.85rem; border-radius: 0.7rem; font-family: monospace; font-size: 0.82rem; text-align: left; direction: ltr; margin-bottom: 0.75rem; border-right: 3px solid var(--primary);">${tense.form}</div>
                        <div style="display: flex; flex-wrap: wrap; gap: 0.3rem; margin-bottom: 0.75rem;">${kws}</div>
                        <div style="display: flex; justify-content: space-between; align-items: center; padding-top: 0.75rem; border-top: 1px solid var(--border);">
                            <span class="level-badge ${tense.level}">${t('lvl-' + tense.level.substring(0,3))}</span>
                            <button class="learn-btn" onclick="openTense(${tense.id})">
                                <i class="fas fa-book-open"></i> ${t('card-learn-tense')}
                            </button>
                        </div>
                    </div>
                </div>`;
            }).join('');

            document.getElementById('pageInfo').textContent = `${t('pageInfo')} ${start+1}-${end} ${t('pageInfoOf')} ${currentDisplayTenses.length} ${t('pageInfoWord')}`;
        }

        function updatePagination() {
            totalPages = Math.ceil(currentDisplayTenses.length / itemsPerPage);
            document.getElementById('prevBtn').disabled = currentPage === 1;
            document.getElementById('nextBtn').disabled = currentPage === totalPages;
            const pn = document.getElementById('pageNumbers');
            pn.innerHTML = '';
            let s = Math.max(1, currentPage - 2), e = Math.min(totalPages, s + 4);
            if (e - s < 4) s = Math.max(1, e - 4);
            if (s > 1) { addPageBtn(pn,1); if(s>2) addDots(pn); }
            for (let i = s; i <= e; i++) addPageBtn(pn, i);
            if (e < totalPages) { if(e<totalPages-1) addDots(pn); addPageBtn(pn, totalPages); }
        }

        function addPageBtn(container, num) {
            const btn = document.createElement('button'); btn.className = `page-number ${num===currentPage?'active':''}`; btn.textContent = num; btn.onclick = () => goToPage(num); container.appendChild(btn);
        }

        function addDots(container) {
            const s = document.createElement('span'); s.className = 'page-number'; s.textContent = '...'; s.style.cssText = 'border:none;cursor:default;opacity:0.4;'; container.appendChild(s);
        }

        function changePage(dir) {
            if (dir==='prev' && currentPage>1) currentPage--;
            else if (dir==='next' && currentPage<totalPages) currentPage++;
            renderGrid(); updatePagination(); window.scrollTo({top:0,behavior:'smooth'});
        }

        function goToPage(p) { currentPage=p; renderGrid(); updatePagination(); window.scrollTo({top:0,behavior:'smooth'}); }

        function toggleSave(id) {
            const wasSaved = savedTenses.includes(id);
            savedTenses = wasSaved ? savedTenses.filter(i=>i!==id) : [...savedTenses, id];
            localStorage.setItem('savedTenses', JSON.stringify(savedTenses));
            updateCounts();
            showToast(wasSaved ? t('toast-unsaved') : t('toast-saved'), wasSaved ? 'info' : 'success');
            const btn = document.querySelector('.modal-save-btn');
            if (btn) {
                const now = savedTenses.includes(id);
                btn.classList.toggle('saved', now);
                btn.innerHTML = `<i class="fas fa-bookmark"></i> ${now ? t('modal-saved') : t('modal-save')}`;
            }
            if (viewingSaved) showSavedTenses(); else renderGrid();
        }

        function showSavedTenses() {
            viewingSaved = true;
            document.getElementById('savedBtn').classList.add('active-saved');
            const data = (typeof TENSES_DATA !== 'undefined') ? TENSES_DATA : [];
            if (!savedTenses.length) {
                document.getElementById('tensesGrid').innerHTML = `<div class="empty-saved"><i class="fas fa-bookmark"></i><h3>${t('empty-h')}</h3><p>${t('empty-p')}</p><button class="back-btn" onclick="exitSavedView()"><i class="fas fa-arrow-right"></i> ${t('btn-back')}</button></div>`;
                document.getElementById('paginationContainer').style.display = 'none'; return;
            }
            currentDisplayTenses = data.filter(t => savedTenses.includes(t.id));
            currentPage = 1; renderGrid(); updatePagination();
        }

        function exitSavedView() { viewingSaved = false; document.getElementById('savedBtn').classList.remove('active-saved'); applyFilters(); }

        function openTense(id) {
            const data = (typeof TENSES_DATA !== 'undefined') ? TENSES_DATA : [];
            currentTense = data.find(t => t.id === id);
            if (!currentTense) return;
            userAnswers = {};
            const isSaved = savedTenses.includes(id);
            const tense = currentTense;

            let examplesHTML = '';
            if (tense.examples?.length) {
                examplesHTML = `<div style="margin-bottom: 1.5rem;"><div style="font-size: 1rem; font-weight: 800; margin-bottom: 0.85rem;"><i class="fas fa-list-ul"></i> ${t("modal-examples")}</div>${tense.examples.map(ex => `<div class="cl-card" style="padding: 1rem 1.1rem; margin-bottom: 0.75rem; border-right: 4px solid var(--secondary);"><div style="font-size: 0.92rem; font-weight: 600; direction: ltr; text-align: left; color: var(--success);">+ ${ex.positive}</div><div style="color: var(--text-secondary); font-size: 0.83rem; margin: 0.15rem 0 0.65rem; direction: rtl; text-align: right;">${ex.positiveAr}</div><div style="font-size: 0.92rem; font-weight: 600; direction: ltr; text-align: left; color: var(--danger);">- ${ex.negative}</div><div style="color: var(--text-secondary); font-size: 0.83rem; margin: 0.15rem 0 0.65rem; direction: rtl; text-align: right;">${ex.negativeAr}</div><div style="font-size: 0.92rem; font-weight: 600; direction: ltr; text-align: left; color: var(--primary);">? ${ex.question}</div><div style="color: var(--text-secondary); font-size: 0.83rem; margin: 0.15rem 0; direction: rtl; text-align: right;">${ex.questionAr}</div></div>`).join('')}</div>`;
            }

            let kwHTML = '';
            if (tense.keywords?.length) {
                kwHTML = `<div style="margin-bottom: 1.5rem;"><div style="font-size: 1rem; font-weight: 800; margin-bottom: 0.85rem;"><i class="fas fa-tags"></i> ${t("modal-keywords")}</div><div style="display: flex; flex-wrap: wrap; gap: 0.45rem;">${tense.keywords.map(k=>`<span style="background: var(--bg-secondary); padding: 0.3rem 0.8rem; border-radius: 2rem; font-size: 0.85rem; color: var(--text-secondary); font-weight: 500; direction: ltr;">${k}</span>`).join('')}</div></div>`;
            }

            let exerHTML = '';
            if (tense.exercises?.length) {
                exerHTML = `<div class="exercises-box"><div style="font-size: 1rem; font-weight: 800; margin-bottom: 0.85rem;"><i class="fas fa-pencil-alt"></i> ${t("modal-exercises")}</div>${tense.exercises.map((ex, i) => `<div class="exercise-item" id="ex-${id}-${i}"><div class="exercise-q">${i+1}. ${ex.question}</div><div class="exercise-options">${ex.options.map((opt, oi) => `<div class="exercise-opt" onclick="selectOpt(${id},${i},${oi},this)"><span class="opt-letter">${String.fromCharCode(65+oi)}</span><span>${opt}</span></div>`).join('')}</div><div class="exercise-exp" id="exp-${id}-${i}">${ex.explanation}</div></div>`).join('')}<button class="btn-check" onclick="checkExercises(${id})"><i class="fas fa-check-circle"></i> ${t("modal-check")}</button></div>`;
            }

            document.getElementById('modalContainer').innerHTML = `
                <div class="modal-topbar"><button class="modal-close-btn" onclick="closeTense()"><i class="fas fa-times"></i></button><span class="modal-level-badge">${t('lvl-' + tense.level.substring(0,3))}</span></div>
                <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 0.4rem;"><span style="font-size: 2.5rem;">${tense.icon || ''}</span><span style="font-size: 1.8rem; font-weight: 800; color: var(--primary); direction: ltr;">${tense.name}</span></div>
                <div style="font-size: 1rem; color: var(--text-secondary); margin-bottom: 1.25rem;">${tense.nameAr}</div>
                <div style="background: var(--bg-secondary); padding: 1.1rem 1.25rem; border-radius: 1rem; font-family: monospace; font-size: 1rem; text-align: left; direction: ltr; margin-bottom: 1.25rem; border-right: 4px solid var(--primary);">${tense.form}</div>
                <div style="background: var(--bg-secondary); padding: 1.35rem; border-radius: 1rem; margin-bottom: 1.25rem; border-right: 4px solid var(--secondary); font-size: 0.95rem; line-height: 1.85; text-align: left; direction: ltr; white-space: pre-line;">${tense.explanation}</div>
                ${kwHTML}${examplesHTML}${exerHTML}
                <div class="modal-actions"><button class="modal-save-btn ${isSaved?'saved':''}" onclick="toggleSave(${id})"><i class="fas fa-bookmark"></i> ${isSaved ? t('modal-saved') : t('modal-save')}</button></div>`;

            document.getElementById('tenseModal').style.opacity = '1';
            document.getElementById('tenseModal').style.visibility = 'visible';
            document.body.style.overflow = 'hidden';
        }

        function closeTense() { document.getElementById('tenseModal').style.opacity = '0'; document.getElementById('tenseModal').style.visibility = 'hidden'; document.body.style.overflow = ''; currentTense = null; }

        function selectOpt(tId, exIdx, optIdx, el) {
            if (el.classList.contains('locked')) return;
            if (!userAnswers[tId]) userAnswers[tId] = {};
            userAnswers[tId][exIdx] = optIdx;
            document.querySelectorAll(`#ex-${tId}-${exIdx} .exercise-opt`).forEach(o => o.classList.remove('selected'));
            el.classList.add('selected');
        }

        function checkExercises(tId) {
            const data  = (typeof TENSES_DATA !== 'undefined') ? TENSES_DATA : [];
            const tense = data.find(t => t.id === tId);
            if (!tense?.exercises) return;
            tense.exercises.forEach((ex, i) => {
                const selected = userAnswers[tId]?.[i];
                const opts = document.querySelectorAll(`#ex-${tId}-${i} .exercise-opt`);
                opts.forEach(o => { o.classList.remove('correct','wrong'); o.classList.add('locked'); });
                if (selected !== undefined) {
                    opts[selected].classList.add(selected===ex.correct ? 'correct' : 'wrong');
                    if (selected !== ex.correct) opts[ex.correct].classList.add('correct');
                } else { opts[ex.correct].classList.add('correct'); }
                document.getElementById(`exp-${tId}-${i}`)?.classList.add('show');
            });
        }

        function showToast(msg, type='info') {
            const tc = document.getElementById('toastContainer');
            const t  = document.createElement('div');
            t.className = `toast ${type}`;
            t.innerHTML = `<i class="fas fa-${type === 'success' ? 'check' : 'info-circle'}"></i> ${msg}`;
            tc.appendChild(t);
            setTimeout(() => { t.style.animation='toastOut 0.3s ease forwards'; setTimeout(()=>t.remove(),300); }, 2200);
        }
    </script>
</body>
</html>
