<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="storiesTitle">CineLingua | قصص قصيرة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="page-header">
            <h1 data-i18n="storiesTitle">قصص قصيرة</h1>
            <div class="quick-stats">
                <div class="quick-stat"><i class="fas fa-book-open"></i><span><b id="totalStories">0</b> <span data-i18n="stat-stories">قصة</span></span></div>
                <div class="quick-stat"><i class="fas fa-bookmark"></i><span><b id="savedCount">0</b> <span data-i18n="saved">محفوظة</span></span></div>
            </div>
        </div>

        <div class="filters-container">
            <div class="filter-row">
                <div class="filter-group">
                    <span class="filter-label" data-i18n="lbl-level">المستوى:</span>
                    <div class="filter-tabs" id="levelFilters">
                        <button class="filter-tab active" onclick="filterByLevel('all')" data-i18n="all">الكل</button>
                        <button class="filter-tab" onclick="filterByLevel('a1')">A1</button>
                        <button class="filter-tab" onclick="filterByLevel('a2')">A2</button>
                        <button class="filter-tab" onclick="filterByLevel('b1')">B1</button>
                        <button class="filter-tab" onclick="filterByLevel('b2')">B2</button>
                        <button class="filter-tab" onclick="filterByLevel('c1')">C1</button>
                        <button class="filter-tab" onclick="filterByLevel('c2')">C2</button>
                    </div>
                </div>
                <button class="saved-btn" id="savedBtn" onclick="showSavedStories()">
                    <i class="fas fa-bookmark"></i> <span data-i18n="saved">المحفوظة</span>
                    <span class="saved-badge" id="savedBadge">0</span>
                </button>
            </div>
            <div class="filter-row">
                <div class="search-box" style="flex:1; margin:0;">
                    <i class="fas fa-search"></i>
                    <input id="searchInput" type="text" data-i18n-placeholder="search" placeholder="ابحث عن قصة..." onkeyup="applyFilters()">
                </div>
            </div>
        </div>

        <div class="stories-grid" id="storiesGrid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 1.2rem;"></div>

        <div class="pagination-container" id="paginationContainer">
            <div class="pagination-controls">
                <button class="page-btn" onclick="changePage('prev')" id="prevBtn" disabled>
                    <i class="fas fa-chevron-right"></i> <span data-i18n="btn-prev">السابق</span>
                </button>
                <div class="page-numbers" id="pageNumbers"></div>
                <button class="page-btn" onclick="changePage('next')" id="nextBtn">
                    <span data-i18n="btn-next">التالي</span> <i class="fas fa-chevron-left"></i>
                </button>
            </div>
            <div class="page-info" id="pageInfo"></div>
        </div>
    </div>

    <!-- STORY MODAL -->
    <div class="tense-modal" id="storyModal" style="position: fixed; inset: 0; background: var(--bg-primary); z-index: 2000; opacity: 0; visibility: hidden; transition: opacity 0.3s; overflow-y: auto;">
        <div class="modal-container" id="modalContainer"></div>
    </div>

    <div class="toast-container" id="toastContainer"></div>
    <button class="scroll-top" id="scrollTop" onclick="window.scrollTo({top:0,behavior:'smooth'})"><i class="fas fa-arrow-up"></i></button>

    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-messaging-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
    <script src="stories-data.js"></script>
    <script src="translation.js"></script>
    <script src="core.js"></script>
    <script>
        let savedStories          = JSON.parse(localStorage.getItem('savedStories')) || [];
        let currentLevel          = 'all';
        let viewingSaved          = false;
        let currentStory          = null;
        let userAnswers           = {};
        let currentPage           = 1;
        const itemsPerPage        = 6;
        let totalPages            = 1;
        let currentDisplayStories = [];

        const READ_TIME_MAP = { a1: '2 دقيقة', a2: '3 دقائق', b1: '4 دقائق', b2: '5 دقائق', c1: '7 دقائق', c2: '9 دقائق' };

        function speakText(text) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'en-US'; u.rate = 0.82; u.pitch = 1.05; u.volume = 1;
            window.speechSynthesis.speak(u);
        }

        function stopSpeaking() { window.speechSynthesis.cancel(); }

        document.addEventListener('DOMContentLoaded', () => {
            updateCounts(); applyFilters();
            window.addEventListener('scroll', () => {
                document.getElementById('scrollTop').classList.toggle('show', window.scrollY > 400);
            });
            window.addEventListener('languageChanged', renderGrid);
        });

        function updateCounts() {
            const total = (typeof STORIES_DATA !== 'undefined') ? STORIES_DATA.length : 0;
            document.getElementById('totalStories').textContent = total;
            document.getElementById('savedCount').textContent   = savedStories.length;
            document.getElementById('savedBadge').textContent   = savedStories.length;
        }

        function filterByLevel(level) {
            if (viewingSaved) exitSavedView();
            currentLevel = level;
            document.querySelectorAll('#levelFilters .filter-tab').forEach(t => {
                const isAr = (localStorage.getItem('cl-language') || 'ar') === 'ar';
                const label = level === 'all' ? (isAr ? 'الكل' : 'All') : level.toUpperCase();
                t.classList.toggle('active', t.textContent.trim() === label);
            });
            applyFilters();
        }

        function applyFilters() {
            if (viewingSaved) { showSavedStories(); return; }
            const data = (typeof STORIES_DATA !== 'undefined') ? STORIES_DATA : [];
            const query = (document.getElementById('searchInput')?.value || '').toLowerCase().trim();
            let filtered = currentLevel === 'all' ? data : data.filter(s => s.level === currentLevel);
            if (query) filtered = filtered.filter(s => s.title.toLowerCase().includes(query) || s.content.toLowerCase().includes(query));
            currentDisplayStories = filtered;
            currentPage = 1; renderGrid(); updatePagination();
        }

        function renderGrid() {
            const grid = document.getElementById('storiesGrid');
            if (!currentDisplayStories.length) {
                grid.innerHTML = `<div class="no-results"><i class="fas fa-search"></i><span data-i18n="no-results">لا توجد قصص مطابقة</span></div>`;
                document.getElementById('paginationContainer').style.display = 'none'; return;
            }
            document.getElementById('paginationContainer').style.display = 'flex';
            const start = (currentPage - 1) * itemsPerPage;
            const end   = Math.min(start + itemsPerPage, currentDisplayStories.length);

            grid.innerHTML = currentDisplayStories.slice(start, end).map(story => {
                const isSaved  = savedStories.includes(story.id);
                const preview  = story.content.length > 110 ? story.content.substring(0,110) + '...' : story.content;
                const readTime = READ_TIME_MAP[story.level] || '3 دقائق';
                return `
                <div class="cl-card story-card ${isSaved ? 'saved' : ''}">
                    <div class="story-img-wrap" style="height: 155px; overflow: hidden; position: relative;">
                        <img src="${story.image || 'https://images.unsplash.com/photo-1474932430478-367dbb6832c1?w=400'}" alt="${story.title}" loading="lazy" style="width: 100%; height: 100%; object-fit: cover;">
                        <span class="level-badge" style="position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.55); color: white; padding: 0.22rem 0.65rem; border-radius: 100px; font-size: 0.7rem; font-weight: 700;">${story.difficulty || story.level}</span>
                    </div>
                    <div class="story-body" style="padding: 1.1rem;">
                        <h3 class="story-title" style="font-size: 1.1rem; font-weight: 800; color: var(--primary); margin-bottom: 0.45rem;">${story.title}</h3>
                        <p class="story-preview" style="color: var(--text-secondary); font-size: 0.85rem; line-height: 1.55; height: 54px; overflow: hidden;">${preview}</p>
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 0.9rem; padding-top: 0.85rem; border-top: 1px solid var(--border);">
                            <span style="font-size: 0.78rem; color: var(--text-secondary);"><i class="fas fa-clock"></i> ${readTime}</span>
                            <button class="learn-btn" onclick="openStory(${story.id})">
                                <i class="fas fa-book-open"></i> ${t('back') === 'رجوع' ? 'اقرأ' : 'Read'}
                            </button>
                        </div>
                    </div>
                </div>`;
            }).join('');

            document.getElementById('pageInfo').textContent = `${t('pageInfo')} ${start+1}-${end} ${t('pageInfoOf')} ${currentDisplayStories.length} ${t('stat-stories')}`;
        }

        function updatePagination() {
            totalPages = Math.ceil(currentDisplayStories.length / itemsPerPage);
            document.getElementById('prevBtn').disabled = currentPage === 1;
            document.getElementById('nextBtn').disabled = currentPage === totalPages;
            const pn = document.getElementById('pageNumbers');
            pn.innerHTML = '';
            let s = Math.max(1, currentPage - 2), e = Math.min(totalPages, s + 4);
            if (e - s < 4) s = Math.max(1, e - 4);
            if (s > 1) { addPageBtn(pn,1); if(s>2) addDots(pn); }
            for (let i = s; i <= e; i++) addPageBtn(pn, i);
            if (e < totalPages) { if(e<totalPages-1) addDots(pn); addPageBtn(pn, totalPages); }
        }

        function addPageBtn(container, num) {
            const btn = document.createElement('button');
            btn.className = `page-number ${num===currentPage?'active':''}`;
            btn.textContent = num; btn.onclick = () => goToPage(num);
            container.appendChild(btn);
        }

        function addDots(container) {
            const s = document.createElement('span'); s.className = 'page-number'; s.textContent = '...'; s.style.cssText = 'border:none;cursor:default;opacity:0.4;'; container.appendChild(s);
        }

        function changePage(dir) {
            if (dir==='prev' && currentPage>1) currentPage--;
            else if (dir==='next' && currentPage<totalPages) currentPage++;
            renderGrid(); updatePagination(); window.scrollTo({top:0,behavior:'smooth'});
        }

        function goToPage(page) { currentPage=page; renderGrid(); updatePagination(); window.scrollTo({top:0,behavior:'smooth'}); }

        function showSavedStories() {
            viewingSaved = true;
            document.getElementById('savedBtn').classList.add('active-saved');
            const data = (typeof STORIES_DATA !== 'undefined') ? STORIES_DATA : [];
            if (!savedStories.length) {
                document.getElementById('storiesGrid').innerHTML = `<div class="empty-saved"><i class="fas fa-bookmark"></i><h3>${t('empty-saved-h')}</h3><p>${t('empty-saved-p')}</p><button class="back-btn" onclick="exitSavedView()"><i class="fas fa-arrow-right"></i> ${t('btn-back')}</button></div>`;
                document.getElementById('paginationContainer').style.display = 'none'; return;
            }
            currentDisplayStories = data.filter(s => savedStories.includes(s.id));
            currentPage = 1; renderGrid(); updatePagination();
        }

        function exitSavedView() { viewingSaved = false; document.getElementById('savedBtn').classList.remove('active-saved'); applyFilters(); }

        function toggleSave(storyId) {
            const wasSaved = savedStories.includes(storyId);
            savedStories = wasSaved ? savedStories.filter(id=>id!==storyId) : [...savedStories, storyId];
            localStorage.setItem('savedStories', JSON.stringify(savedStories));
            updateCounts();
            showToast(wasSaved ? t('toast-unsaved') : t('toast-saved'), wasSaved ? 'info' : 'success');
            const btn = document.querySelector('.modal-save-btn');
            if (btn) {
                const now = savedStories.includes(storyId);
                btn.classList.toggle('saved', now);
                btn.innerHTML = `<i class="fas fa-bookmark"></i> ${now ? t('unsave') : t('save')}`;
            }
            viewingSaved ? showSavedStories() : renderGrid();
        }

        function openStory(storyId) {
            const data = (typeof STORIES_DATA !== 'undefined') ? STORIES_DATA : [];
            currentStory = data.find(s => s.id === storyId);
            if (!currentStory) return;
            userAnswers = {};
            const isSaved = savedStories.includes(currentStory.id);

            let questionsHTML = '';
            if (currentStory.questions?.length) {
                questionsHTML = `
                <div class="exercises-box">
                    <h3 style="font-size: 1.05rem; font-weight: 800; margin-bottom: 1.25rem;"><i class="fas fa-question-circle"></i> ${t('comprehensionQuestions')}</h3>
                    ${currentStory.questions.map((q, qi) => `
                        <div class="exercise-item" id="qi-${currentStory.id}-${qi}">
                            <div class="exercise-q">${qi+1}. ${q.question}</div>
                            <div class="exercise-options">
                                ${q.options.map((opt, oi) => `
                                    <div class="exercise-opt" onclick="selectOpt(${currentStory.id},${qi},${oi},this)">
                                        <span class="opt-letter">${String.fromCharCode(65+oi)}</span>
                                        <span>${opt}</span>
                                    </div>`).join('')}
                            </div>
                            <div class="exercise-exp" id="exp-${currentStory.id}-${qi}">${q.explanation || ''}</div>
                        </div>`).join('')}
                    <button class="btn-check" onclick="checkAnswers(${currentStory.id})">
                        <i class="fas fa-check-circle"></i> ${t('checkAnswers')}
                    </button>
                </div>`;
            }

            const escapedContent = currentStory.content.replace(/\\/g,'\\\\').replace(/`/g,'\\`');

            document.getElementById('modalContainer').innerHTML = `
                <div class="modal-topbar">
                    <button class="modal-close-btn" onclick="closeStory()"><i class="fas fa-times"></i></button>
                    <span class="modal-level-badge">${currentStory.difficulty || currentStory.level}</span>
                </div>
                <div style="width: 100%; height: 250px; border-radius: 1.1rem; overflow: hidden; margin-bottom: 1.5rem; position: relative;">
                    <img src="${currentStory.image}" alt="${currentStory.title}" loading="lazy" style="width: 100%; height: 100%; object-fit: cover;">
                    <div style="position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.55) 0%, transparent 60%);"></div>
                    <div style="position: absolute; bottom: 1.1rem; right: 1.25rem; color: white; font-size: 1.5rem; font-weight: 800;">${currentStory.title}</div>
                </div>
                <div style="display: flex; gap: 0.75rem; margin-bottom: 1.25rem;">
                    <button class="learn-btn" onclick="speakText(\`${escapedContent}\`)"><i class="fas fa-play"></i> ${t('listen')}</button>
                    <button class="action-btn" onclick="stopSpeaking()" style="background:var(--bg-secondary);"><i class="fas fa-stop"></i></button>
                </div>
                <div style="background: var(--bg-secondary); padding: 1.5rem; border-radius: 1rem; margin-bottom: 1.25rem; border-right: 4px solid var(--primary); font-size: 1rem; line-height: 1.85; direction: ltr; text-align: left; white-space: pre-line;">${currentStory.content}</div>
                <button class="translation-toggle" onclick="toggleTranslation()" style="background: transparent; color: var(--primary); border: 1.5px solid rgba(99,102,241,0.4); padding: 0.55rem 1.2rem; border-radius: 2rem; cursor: pointer; margin-bottom: 0.85rem;"><i class="fas fa-language"></i> ${t('showTranslation')}</button>
                <div id="storyTranslation" style="background: var(--bg-secondary); padding: 1.35rem; border-radius: 1rem; margin-bottom: 1.5rem; border-right: 4px solid var(--secondary); font-size: 0.95rem; line-height: 1.8; direction: rtl; text-align: right; display: none;">${currentStory.arabic}</div>
                ${questionsHTML}
                <div class="modal-actions">
                    <button class="modal-save-btn ${isSaved?'saved':''}" onclick="toggleSave(${currentStory.id})">
                        <i class="fas fa-bookmark"></i> ${isSaved ? t('unsave') : t('save')}
                    </button>
                </div>`;

            document.getElementById('storyModal').style.opacity = '1';
            document.getElementById('storyModal').style.visibility = 'visible';
            document.body.style.overflow = 'hidden';
        }

        function closeStory() {
            stopSpeaking();
            document.getElementById('storyModal').style.opacity = '0';
            document.getElementById('storyModal').style.visibility = 'hidden';
            document.body.style.overflow = '';
            currentStory = null;
        }

        function toggleTranslation() { const el = document.getElementById('storyTranslation'); el.style.display = el.style.display === 'none' ? 'block' : 'none'; }

        function selectOpt(storyId, qi, oi, el) {
            if (el.classList.contains('locked')) return;
            if (!userAnswers[storyId]) userAnswers[storyId] = {};
            userAnswers[storyId][qi] = oi;
            document.querySelectorAll(`#qi-${storyId}-${qi} .exercise-opt`).forEach(o => o.classList.remove('selected'));
            el.classList.add('selected');
        }

        function checkAnswers(storyId) {
            const data  = (typeof STORIES_DATA !== 'undefined') ? STORIES_DATA : [];
            const story = data.find(s => s.id === storyId);
            if (!story?.questions) return;
            story.questions.forEach((q, qi) => {
                const selected = userAnswers[storyId]?.[qi];
                const opts = document.querySelectorAll(`#qi-${storyId}-${qi} .exercise-opt`);
                opts.forEach(o => { o.classList.remove('correct','wrong'); o.classList.add('locked'); });
                if (selected !== undefined) {
                    opts[selected].classList.add(selected===q.correct ? 'correct' : 'wrong');
                    if (selected !== q.correct) opts[q.correct].classList.add('correct');
                } else { opts[q.correct].classList.add('correct'); }
                document.getElementById(`exp-${storyId}-${qi}`)?.classList.add('show');
            });
        }

        function showToast(msg, type='info') {
            const tc = document.getElementById('toastContainer');
            const t  = document.createElement('div');
            t.className = `toast ${type}`;
            t.innerHTML = `<i class="fas fa-${type==='success'?'check':'info-circle'}"></i> ${msg}`;
            tc.appendChild(t);
            setTimeout(() => { t.style.animation='toastOut 0.3s ease forwards'; setTimeout(()=>t.remove(),300); }, 2200);
        }
    </script>
</body>
</html>
