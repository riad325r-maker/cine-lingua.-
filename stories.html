<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineLingua | قصص قصيرة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #6366f1; --primary-dark: #4f46e5; --secondary: #ec4899;
            --success: #22c55e; --danger: #ef4444; --warning: #f59e0b;
            --border: #e2e8f0; --shadow: 0 4px 6px -1px rgba(0,0,0,0.08);
            --shadow-lg: 0 10px 25px -5px rgba(0,0,0,0.12);
            --bg-primary: #f8fafc; --bg-card: #ffffff; --bg-secondary: #f1f5f9;
            --text-primary: #0f172a; --text-secondary: #64748b;
        }

        [data-theme="dark"] {
            --border: #334155; --bg-primary: #0f172a; --bg-card: #1e293b;
            --bg-secondary: #334155; --text-primary: #f8fafc; --text-secondary: #cbd5e1;
        }

        body { background-color: var(--bg-primary); color: var(--text-primary); font-family: 'Plus Jakarta Sans', sans-serif; transition: background 0.3s, color 0.3s; }

        /* ===== NAVBAR ===== */
        .navbar { background: var(--bg-card); box-shadow: 0 1px 0 var(--border); position: fixed; width: 100%; top: 0; z-index: 1000; }
        .nav-container { max-width: 1300px; margin: 0 auto; padding: 0.9rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { display: flex; align-items: center; gap: 0.5rem; font-size: 1.45rem; font-weight: 800; background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; }
        .nav-menu { display: flex; gap: 0.25rem; list-style: none; }
        .nav-menu a { text-decoration: none; color: var(--text-secondary); font-weight: 500; padding: 0.5rem 0.9rem; border-radius: 0.6rem; transition: all 0.2s; font-size: 0.9rem; }
        .nav-menu a:hover, .nav-menu a.active { color: var(--primary); background: rgba(99,102,241,0.08); }
        .nav-right { display: flex; align-items: center; gap: 0.75rem; }
        .theme-toggle { display: flex; background: var(--bg-secondary); padding: 0.2rem; border-radius: 2rem; }
        .theme-btn { padding: 0.4rem 0.8rem; border: none; background: transparent; border-radius: 2rem; cursor: pointer; color: var(--text-secondary); transition: all 0.2s; font-size: 0.85rem; }
        .theme-btn.active { background: var(--primary); color: white; }
        .menu-toggle { background: none; border: none; font-size: 1.5rem; color: var(--primary); cursor: pointer; display: none; }

        @media (max-width: 900px) {
            .menu-toggle { display: block; }
            .nav-menu { display: none; position: absolute; top: 100%; right: 0; left: 0; background: var(--bg-card); flex-direction: column; padding: 0.75rem; gap: 0.2rem; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-bottom: 1px solid var(--border); }
            .nav-menu.show { display: flex; }
            .nav-menu a { padding: 0.75rem 1rem; display: block; }
        }

        /* ===== LAYOUT ===== */
        .container { max-width: 1300px; margin: 80px auto 2rem; padding: 0 1.5rem; }

        /* ===== PAGE HEADER ===== */
        .page-header { display: flex; justify-content: space-between; align-items: center; margin: 1.5rem 0; flex-wrap: wrap; gap: 1rem; }
        .page-header h1 { font-size: 1.8rem; font-weight: 800; background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .quick-stats { display: flex; gap: 0.75rem; background: var(--bg-card); padding: 0.6rem 1.2rem; border-radius: 2rem; border: 1px solid var(--border); }
        .quick-stat { display: flex; align-items: center; gap: 0.4rem; font-size: 0.85rem; color: var(--text-secondary); font-weight: 500; }
        .quick-stat i { font-size: 0.8rem; color: var(--primary); }
        .quick-stat b { color: var(--text-primary); }

        /* ===== FILTERS ===== */
        .filters-container { display: flex; flex-direction: column; gap: 0.75rem; margin-bottom: 1.5rem; }
        .filter-row { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 0.75rem; }
        .filter-group { display: flex; flex-wrap: wrap; align-items: center; gap: 0.75rem; }
        .filter-label { font-weight: 700; color: var(--primary); font-size: 0.88rem; min-width: 55px; }
        .filter-tabs { display: flex; gap: 0.35rem; background: var(--bg-card); padding: 0.3rem; border-radius: 2rem; border: 1px solid var(--border); flex-wrap: wrap; }
        .filter-tab { padding: 0.5rem 1.1rem; border: none; background: transparent; border-radius: 2rem; cursor: pointer; font-weight: 600; color: var(--text-secondary); transition: all 0.25s; font-size: 0.85rem; white-space: nowrap; font-family: inherit; }
        .filter-tab:hover { background: rgba(99,102,241,0.08); color: var(--primary); }
        .filter-tab.active { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; box-shadow: 0 2px 8px rgba(99,102,241,0.3); }
        .saved-btn { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; border: none; padding: 0.6rem 1.2rem; border-radius: 2rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 0.55rem; transition: all 0.3s; font-family: inherit; font-size: 0.88rem; box-shadow: 0 4px 10px rgba(99,102,241,0.22); }
        .saved-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(99,102,241,0.3); }
        .saved-btn.active-saved { background: linear-gradient(135deg, var(--success), #16a34a); }
        .saved-badge { background: white; color: var(--primary); padding: 0.12rem 0.5rem; border-radius: 1rem; font-size: 0.76rem; font-weight: 800; }

        /* ===== STORIES GRID ===== */
        .stories-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 1.2rem; }

        /* ===== STORY CARD ===== */
        .story-card { background: var(--bg-card); border-radius: 1.2rem; overflow: hidden; box-shadow: var(--shadow); border: 2px solid transparent; transition: all 0.3s; }
        .story-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); border-color: rgba(99,102,241,0.3); }
        .story-card.saved { border-color: rgba(34,197,94,0.4); }
        .story-img-wrap { height: 155px; overflow: hidden; position: relative; }
        .story-img-wrap img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s ease; }
        .story-card:hover .story-img-wrap img { transform: scale(1.06); }
        .story-level-tag { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.55); backdrop-filter: blur(6px); color: white; padding: 0.22rem 0.65rem; border-radius: 100px; font-size: 0.7rem; font-weight: 700; }
        .story-body { padding: 1.1rem; }
        .story-title { font-size: 1.1rem; font-weight: 800; color: var(--primary); margin-bottom: 0.45rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .story-preview { color: var(--text-secondary); font-size: 0.85rem; line-height: 1.55; height: 54px; overflow: hidden; direction: ltr; text-align: left; }
        .story-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 0.9rem; padding-top: 0.85rem; border-top: 1px solid var(--border); }
        .story-time { font-size: 0.78rem; color: var(--text-secondary); display: flex; align-items: center; gap: 0.3rem; }
        .read-btn { padding: 0.5rem 1.1rem; border: none; border-radius: 2rem; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; font-weight: 700; cursor: pointer; transition: all 0.25s; font-size: 0.8rem; font-family: inherit; display: flex; align-items: center; gap: 0.35rem; }
        .read-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 12px rgba(99,102,241,0.35); }

        /* ===== EMPTY / NO RESULTS ===== */
        .no-results { text-align: center; padding: 3rem; color: var(--text-secondary); font-size: 1rem; grid-column: 1/-1; }
        .no-results i { font-size: 2.5rem; display: block; margin-bottom: 0.75rem; }
        .empty-saved { text-align: center; padding: 3.5rem 2rem; background: var(--bg-card); border-radius: 1.5rem; box-shadow: var(--shadow); grid-column: 1/-1; }
        .empty-saved i { font-size: 3rem; color: var(--text-secondary); display: block; margin-bottom: 0.75rem; }
        .empty-saved h3 { font-size: 1.3rem; color: var(--text-secondary); margin-bottom: 0.4rem; }
        .empty-saved p { color: var(--text-secondary); margin-bottom: 1.5rem; font-size: 0.9rem; }
        .back-btn { background: var(--primary); color: white; border: none; padding: 0.65rem 1.8rem; border-radius: 2rem; font-weight: 600; cursor: pointer; font-family: inherit; transition: all 0.2s; }
        .back-btn:hover { background: var(--primary-dark); transform: scale(1.03); }

        /* ===== PAGINATION ===== */
        .pagination-container { margin: 2.5rem 0 1.5rem; display: flex; flex-direction: column; align-items: center; gap: 0.85rem; }
        .pagination-controls { display: flex; justify-content: center; align-items: center; gap: 0.75rem; flex-wrap: wrap; }
        .page-btn { padding: 0.6rem 1.2rem; border: 2px solid var(--primary); background: var(--bg-card); color: var(--primary); border-radius: 2rem; font-weight: 600; cursor: pointer; transition: all 0.25s; display: flex; align-items: center; gap: 0.4rem; font-size: 0.88rem; font-family: inherit; }
        .page-btn:hover:not(:disabled) { background: var(--primary); color: white; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(99,102,241,0.3); }
        .page-btn:disabled { opacity: 0.4; cursor: not-allowed; border-color: var(--border); }
        .page-numbers { display: flex; gap: 0.4rem; flex-wrap: wrap; justify-content: center; }
        .page-number { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border: 2px solid var(--border); background: var(--bg-card); color: var(--text-primary); border-radius: 50%; font-weight: 600; cursor: pointer; transition: all 0.25s; font-size: 0.88rem; }
        .page-number:hover { border-color: var(--primary); color: var(--primary); }
        .page-number.active { background: var(--primary); color: white; border-color: var(--primary); transform: scale(1.08); box-shadow: 0 4px 12px rgba(99,102,241,0.3); }
        .page-info { color: var(--text-secondary); font-size: 0.83rem; font-weight: 500; background: var(--bg-card); padding: 0.55rem 1.2rem; border-radius: 2rem; border: 1px solid var(--border); }

        /* ===== STORY MODAL ===== */
        .story-modal { position: fixed; inset: 0; background: var(--bg-primary); z-index: 2000; opacity: 0; visibility: hidden; transition: opacity 0.3s, visibility 0.3s; overflow-y: auto; }
        .story-modal.active { opacity: 1; visibility: visible; }
        .modal-container { max-width: 760px; margin: 0 auto; padding: 1.5rem 1.5rem 4rem; min-height: 100vh; }

        .modal-topbar { position: sticky; top: 0; z-index: 10; background: var(--bg-primary); padding: 1rem 0 0.75rem; display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; border-bottom: 1px solid var(--border); }
        .modal-close-btn { width: 38px; height: 38px; border-radius: 50%; border: 1.5px solid var(--border); background: var(--bg-card); color: var(--text-secondary); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; font-size: 0.9rem; }
        .modal-close-btn:hover { background: var(--danger); color: white; border-color: var(--danger); }
        .modal-level-badge { background: rgba(99,102,241,0.1); color: var(--primary); padding: 0.25rem 0.75rem; border-radius: 100px; font-size: 0.78rem; font-weight: 700; }

        .modal-hero { width: 100%; height: 250px; border-radius: 1.1rem; overflow: hidden; margin-bottom: 1.5rem; position: relative; }
        .modal-hero img { width: 100%; height: 100%; object-fit: cover; }
        .modal-hero-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.55) 0%, transparent 60%); }
        .modal-hero-title { position: absolute; bottom: 1.1rem; right: 1.25rem; color: white; font-size: 1.5rem; font-weight: 800; direction: ltr; text-align: left; }

        .audio-row { display: flex; gap: 0.75rem; margin-bottom: 1.25rem; flex-wrap: wrap; }
        .audio-btn { padding: 0.65rem 1.3rem; border: none; border-radius: 2rem; font-weight: 700; cursor: pointer; transition: all 0.25s; font-family: inherit; font-size: 0.88rem; display: flex; align-items: center; gap: 0.45rem; }
        .audio-btn.play { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; box-shadow: 0 4px 10px rgba(99,102,241,0.28); }
        .audio-btn.play:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(99,102,241,0.38); }
        .audio-btn.stop { background: var(--bg-secondary); color: var(--text-secondary); border: 1.5px solid var(--border); }
        .audio-btn.stop:hover { background: var(--danger); color: white; border-color: var(--danger); }

        .modal-story-text { background: var(--bg-secondary); padding: 1.5rem; border-radius: 1rem; margin-bottom: 1.25rem; border-right: 4px solid var(--primary); font-size: 1rem; line-height: 1.85; direction: ltr; text-align: left; white-space: pre-line; word-wrap: break-word; color: var(--text-primary); }

        .translation-toggle { background: transparent; color: var(--primary); border: 1.5px solid rgba(99,102,241,0.4); padding: 0.55rem 1.2rem; border-radius: 2rem; font-weight: 600; cursor: pointer; font-family: inherit; font-size: 0.88rem; transition: all 0.2s; display: flex; align-items: center; gap: 0.45rem; margin-bottom: 0.85rem; }
        .translation-toggle:hover { background: var(--primary); color: white; border-color: var(--primary); }
        .modal-translation { background: var(--bg-secondary); padding: 1.35rem; border-radius: 1rem; margin-bottom: 1.5rem; border-right: 4px solid var(--secondary); font-size: 0.95rem; line-height: 1.8; direction: rtl; text-align: right; word-wrap: break-word; display: none; }
        .modal-translation.show { display: block; }

        /* ===== QUESTIONS ===== */
        .questions-section { background: var(--bg-secondary); padding: 1.5rem; border-radius: 1.1rem; margin-bottom: 1.5rem; border: 1px solid var(--border); }
        .questions-section h3 { font-size: 1.05rem; font-weight: 800; margin-bottom: 1.25rem; display: flex; align-items: center; gap: 0.5rem; }
        .question-item { background: var(--bg-card); padding: 1.1rem; border-radius: 0.9rem; margin-bottom: 0.85rem; border: 1.5px solid var(--border); }
        .question-text { font-weight: 700; font-size: 0.92rem; margin-bottom: 0.75rem; direction: ltr; text-align: left; line-height: 1.5; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; margin-bottom: 0.5rem; }
        .option { padding: 0.7rem 0.75rem; border: 1.5px solid var(--border); border-radius: 0.7rem; cursor: pointer; transition: all 0.2s; background: var(--bg-secondary); display: flex; align-items: center; gap: 0.5rem; font-size: 0.83rem; line-height: 1.4; direction: ltr; text-align: left; }
        .option:hover:not(.locked) { border-color: var(--primary); background: rgba(99,102,241,0.06); }
        .option.selected { border-color: var(--primary); background: rgba(99,102,241,0.08); }
        .option.correct { border-color: var(--success); background: rgba(34,197,94,0.1); }
        .option.wrong   { border-color: var(--danger);  background: rgba(239,68,68,0.08); }
        .opt-letter { width: 26px; height: 26px; min-width: 26px; border-radius: 50%; background: var(--bg-card); display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 0.76rem; flex-shrink: 0; transition: all 0.2s; border: 1px solid var(--border); color: var(--text-secondary); }
        .option.selected .opt-letter { background: var(--primary); color: white; border-color: var(--primary); }
        .option.correct  .opt-letter { background: var(--success); color: white; border-color: var(--success); }
        .option.wrong    .opt-letter { background: var(--danger);  color: white; border-color: var(--danger); }
        .explanation { margin-top: 0.5rem; padding: 0.65rem 0.85rem; border-radius: 0.65rem; background: rgba(99,102,241,0.07); border-right: 3px solid var(--primary); font-size: 0.82rem; direction: ltr; text-align: left; display: none; line-height: 1.5; }
        .explanation.show { display: block; }
        .btn-check { width: 100%; padding: 0.75rem; border: none; border-radius: 0.85rem; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; font-size: 0.9rem; font-weight: 700; cursor: pointer; transition: all 0.25s; font-family: inherit; margin-top: 0.25rem; }
        .btn-check:hover { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(99,102,241,0.35); }

        /* ===== MODAL ACTIONS ===== */
        .modal-actions { display: flex; gap: 0.75rem; margin-top: 1.5rem; }
        .modal-save-btn { flex: 1; padding: 0.85rem; border: none; border-radius: 0.9rem; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; font-weight: 700; cursor: pointer; transition: all 0.25s; display: flex; align-items: center; justify-content: center; gap: 0.5rem; font-family: inherit; font-size: 0.9rem; }
        .modal-save-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(99,102,241,0.35); }
        .modal-save-btn.saved { background: linear-gradient(135deg, var(--success), #16a34a); }

        /* ===== TOAST ===== */
        .toast-container { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 0.45rem; align-items: center; }
        .toast { background: var(--bg-card); color: var(--text-primary); padding: 0.7rem 1.4rem; border-radius: 2rem; box-shadow: 0 8px 30px rgba(0,0,0,0.13); border: 1px solid var(--border); font-weight: 600; font-size: 0.88rem; display: flex; align-items: center; gap: 0.5rem; animation: toastIn 0.3s ease; white-space: nowrap; }
        .toast.success { border-color: var(--success); color: var(--success); }
        .toast.info    { border-color: var(--primary); color: var(--primary); }
        @keyframes toastIn  { from { opacity:0; transform:translateY(12px) scale(0.92); } to { opacity:1; transform:translateY(0) scale(1); } }
        @keyframes toastOut { to   { opacity:0; transform:translateY(12px) scale(0.92); } }

        /* ===== SCROLL TOP ===== */
        .scroll-top { position: fixed; bottom: 2rem; right: 2rem; background: var(--primary); color: white; border: none; width: 42px; height: 42px; border-radius: 50%; cursor: pointer; font-size: 0.95rem; display: none; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(99,102,241,0.4); z-index: 500; transition: all 0.2s; }
        .scroll-top.show { display: flex; }
        .scroll-top:hover { transform: translateY(-3px); }

        /* ===== FOOTER ===== */
        .footer { background: var(--bg-card); border-top: 1px solid var(--border); text-align: center; padding: 1.75rem 2rem; margin-top: 4rem; color: var(--text-secondary); font-size: 0.88rem; }

        @media (max-width: 640px) {
            .stories-grid { grid-template-columns: 1fr; }
            .options-grid { grid-template-columns: 1fr; }
            .modal-hero { height: 190px; }
        }
        /* ===== SETTINGS BUTTON ===== */
        .settings-btn { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), var(--secondary)); border: none; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 0.95rem; transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1); box-shadow: 0 2px 10px rgba(99,102,241,0.4); flex-shrink: 0; }
        .settings-btn:hover { transform: rotate(90deg) scale(1.1); box-shadow: 0 4px 18px rgba(99,102,241,0.55); }
        /* ===== SETTINGS PANEL ===== */
        .settings-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 9990; display: none; backdrop-filter: blur(4px); }
        .settings-overlay.show { display: block; }
        .settings-panel { position: fixed; top: 0; right: 0; z-index: 9991; width: 300px; max-width: 92vw; height: 100vh; background: var(--bg-card); display: flex; flex-direction: column; transform: translateX(110%); transition: transform 0.35s cubic-bezier(0.4,0,0.2,1); overflow: hidden; }
        .settings-panel.show { transform: translateX(0); }
        .settings-header { padding: 1.4rem 1.5rem; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
        .settings-header-left { display: flex; align-items: center; gap: 0.85rem; }
        .settings-header-icon { width: 40px; height: 40px; border-radius: 0.65rem; background: rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; font-size: 1.1rem; }
        .settings-header-title { font-size: 1.05rem; font-weight: 800; }
        .settings-header-sub { font-size: 0.72rem; opacity: 0.75; margin-top: 1px; }
        .settings-close { width: 30px; height: 30px; border-radius: 50%; background: rgba(255,255,255,0.2); border: none; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 0.85rem; transition: all 0.2s; }
        .settings-close:hover { background: rgba(255,255,255,0.35); transform: rotate(90deg); }
        .settings-body { flex: 1; overflow-y: auto; padding: 1.25rem; display: flex; flex-direction: column; gap: 1.4rem; }
        .settings-section { display: flex; flex-direction: column; gap: 0.65rem; }
        .settings-section-title { display: flex; align-items: center; gap: 0.5rem; font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text-secondary); }
        .settings-section-title i { color: var(--primary); }
        .settings-theme-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.65rem; }
        .settings-theme-btn { display: flex; flex-direction: column; align-items: center; gap: 0.5rem; padding: 0.85rem 0.5rem; border-radius: 0.9rem; border: 2px solid var(--border); background: var(--bg-secondary); cursor: pointer; font-size: 0.82rem; font-weight: 600; color: var(--text-secondary); font-family: inherit; position: relative; transition: all 0.2s; }
        .settings-theme-btn:hover { border-color: rgba(99,102,241,0.4); color: var(--primary); }
        .settings-theme-btn.active { border-color: var(--primary); background: rgba(99,102,241,0.08); color: var(--primary); }
        .settings-theme-btn.active::after { content: '✓'; position: absolute; top: 6px; left: 8px; font-size: 0.65rem; font-weight: 800; width: 16px; height: 16px; background: var(--primary); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; line-height: 16px; text-align: center; }
        .theme-preview { width: 100%; height: 48px; border-radius: 0.5rem; overflow: hidden; display: flex; flex-direction: column; gap: 3px; padding: 5px; border: 1px solid rgba(0,0,0,0.07); }
        .theme-preview.light { background: #f8fafc; } .theme-preview.dark { background: #0f172a; }
        .theme-preview .p-bar { height: 6px; border-radius: 3px; background: linear-gradient(90deg,#6366f1,#ec4899); }
        .theme-preview .p-card { height: 7px; border-radius: 3px; }
        .theme-preview.light .p-card { background: white; border: 1px solid #e2e8f0; } .theme-preview.dark .p-card { background: #1e293b; border: 1px solid #334155; }
        .theme-preview .p-card.short { width: 65%; }
        .settings-lang-row { display: flex; flex-direction: column; gap: 0.5rem; }
        .settings-lang-btn { display: flex; align-items: center; gap: 0.85rem; padding: 0.9rem 1rem; border-radius: 0.85rem; border: 2px solid var(--border); background: var(--bg-secondary); cursor: pointer; font-family: inherit; width: 100%; color: var(--text-primary); transition: all 0.2s; }
        .settings-lang-btn:hover { border-color: rgba(99,102,241,0.4); }
        .settings-lang-btn.active { border-color: var(--primary); background: rgba(99,102,241,0.08); }
        .lang-flag { font-size: 1.4rem; flex-shrink: 0; } .lang-info { display: flex; flex-direction: column; flex: 1; gap: 1px; }
        .lang-name { font-size: 0.9rem; font-weight: 700; } .lang-sub { font-size: 0.72rem; color: var(--text-secondary); }
        .lang-check { color: var(--primary); font-size: 0.85rem; opacity: 0; transition: opacity 0.2s; }
        .settings-lang-btn.active .lang-check { opacity: 1; }
        .settings-notif-card { background: var(--bg-secondary); border: 1.5px solid var(--border); border-radius: 0.9rem; overflow: hidden; }
        .settings-notif-top { display: flex; align-items: center; justify-content: space-between; padding: 0.85rem 1rem; border-bottom: 1px solid var(--border); }
        .settings-notif-label { font-size: 0.88rem; font-weight: 600; color: var(--text-primary); }
        .notif-badge { font-size: 0.72rem; font-weight: 700; padding: 0.25rem 0.65rem; border-radius: 2rem; }
        .notif-badge.granted { background: rgba(34,197,94,0.12); color: #16a34a; } .notif-badge.denied { background: rgba(239,68,68,0.12); color: #dc2626; } .notif-badge.default { background: rgba(99,102,241,0.12); color: var(--primary); }
        .notif-action-btn { width: 100%; padding: 0.85rem 1rem; border: none; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; font-weight: 700; font-size: 0.88rem; cursor: pointer; font-family: inherit; display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
        .notif-action-btn:disabled { opacity: 0.5; cursor: not-allowed; background: var(--bg-secondary); color: var(--text-secondary); }
        .settings-footer { padding: 1rem 1.5rem; border-top: 1px solid var(--border); text-align: center; font-size: 0.75rem; color: var(--text-secondary); flex-shrink: 0; }

    </style>
</head>
<body>

    <!-- SETTINGS PANEL -->
    <div class="settings-overlay" id="settingsOverlay" onclick="closeSettings()"></div>
    <div class="settings-panel" id="settingsPanel">
        <div class="settings-header">
            <div class="settings-header-left">
                <div class="settings-header-icon"><i class="fas fa-sliders-h"></i></div>
                <div><div class="settings-header-title" id="s-title">الإعدادات</div><div class="settings-header-sub">CineLingua</div></div>
            </div>
            <button class="settings-close" onclick="closeSettings()"><i class="fas fa-times"></i></button>
        </div>
        <div class="settings-body">
            <div class="settings-section">
                <div class="settings-section-title"><i class="fas fa-palette"></i> <span id="s-appearance">المظهر</span></div>
                <div class="settings-theme-row">
                    <button class="settings-theme-btn" id="btn-light" onclick="setTheme('light')"><div class="theme-preview light"><div class="p-bar"></div><div class="p-card"></div><div class="p-card short"></div></div><i class="fas fa-sun"></i> <span id="s-light">فاتح</span></button>
                    <button class="settings-theme-btn" id="btn-dark" onclick="setTheme('dark')"><div class="theme-preview dark"><div class="p-bar"></div><div class="p-card"></div><div class="p-card short"></div></div><i class="fas fa-moon"></i> <span id="s-dark">داكن</span></button>
                </div>
            </div>
            <div class="settings-section">
                <div class="settings-section-title"><i class="fas fa-globe"></i> <span id="s-lang">اللغة</span></div>
                <div class="settings-lang-row">
                    <button class="settings-lang-btn" id="lang-ar" onclick="setLang('ar')"><span class="lang-flag">🌙</span><div class="lang-info"><span class="lang-name">العربية</span><span class="lang-sub">Arabic</span></div><i class="fas fa-check lang-check"></i></button>
                    <button class="settings-lang-btn" id="lang-en" onclick="setLang('en')"><span class="lang-flag">🌐</span><div class="lang-info"><span class="lang-name">English</span><span class="lang-sub">الإنجليزية</span></div><i class="fas fa-check lang-check"></i></button>
                </div>
            </div>
            <div class="settings-section">
                <div class="settings-section-title"><i class="fas fa-bell"></i> <span id="s-notif">الإشعارات</span></div>
                <div class="settings-notif-card">
                    <div class="settings-notif-top"><span class="settings-notif-label" id="s-notif-status">حالة الإشعارات</span><span class="notif-badge default" id="notifBadge">غير محددة</span></div>
                    <button class="notif-action-btn" id="notifActionBtn" onclick="requestNotifSettings()"><i class="fas fa-bell"></i> <span id="s-notif-btn">تفعيل الإشعارات</span></button>
                </div>
            </div>
        </div>
        <div class="settings-footer">CineLingua • v2.0</div>
    </div>


    <nav class="navbar">
        <div class="nav-container">
            <a class="logo" href="index.html"><i class="fas fa-film"></i> CineLingua</a>
            <button class="menu-toggle" onclick="toggleMenu()"><i class="fas fa-bars"></i></button>
            <ul class="nav-menu" id="navMenu">
                <li><a href="index.html" id="nav-home">الرئيسية</a></li>
                <li><a href="lessons.html" id="nav-lessons">الكلمات</a></li>
                <li><a href="stories.html" id="nav-stories" class="active">القصص</a></li>
                <li><a href="tenses.html" id="nav-tenses">الأزمنة</a></li>
                <li><a href="quiz.html" id="nav-quiz">الاختبارات</a></li>
                <li><a href="download.html" id="nav-download">تحميل التطبيق</a></li>
            </ul>
            <div class="nav-right">
                <div class="theme-toggle">
                    <button class="theme-btn active" onclick="setTheme('light')"><i class="fas fa-sun"></i></button>
                    <button class="theme-btn" onclick="setTheme('dark')"><i class="fas fa-moon"></i></button>
                </div>
                <button class="settings-btn" onclick="openSettings()"><i class="fas fa-cog"></i></button>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1>قصص قصيرة</h1>
            <div class="quick-stats">
                <div class="quick-stat"><i class="fas fa-book-open"></i><span><b id="totalStories">0</b> قصة</span></div>
                <div class="quick-stat"><i class="fas fa-bookmark"></i><span><b id="savedCount">0</b> محفوظة</span></div>
            </div>
        </div>

        <div class="filters-container">
            <div class="filter-row">
                <div class="filter-group">
                    <span class="filter-label">المستوى:</span>
                    <div class="filter-tabs" id="levelFilters">
                        <button class="filter-tab active" onclick="filterByLevel('all')">الكل</button>
                        <button class="filter-tab" onclick="filterByLevel('a1')">A1</button>
                        <button class="filter-tab" onclick="filterByLevel('a2')">A2</button>
                        <button class="filter-tab" onclick="filterByLevel('b1')">B1</button>
                        <button class="filter-tab" onclick="filterByLevel('b2')">B2</button>
                        <button class="filter-tab" onclick="filterByLevel('c1')">C1</button>
                        <button class="filter-tab" onclick="filterByLevel('c2')">C2</button>
                    </div>
                </div>
                <button class="saved-btn" id="savedBtn" onclick="showSavedStories()">
                    <i class="fas fa-bookmark"></i> المحفوظة
                    <span class="saved-badge" id="savedBadge">0</span>
                </button>
            </div>
            <div class="filter-row">
                <div style="position:relative;flex:1;max-width:380px">
                    <i class="fas fa-search" style="position:absolute;right:1rem;top:50%;transform:translateY(-50%);color:var(--text-secondary);font-size:0.85rem;pointer-events:none"></i>
                    <input id="searchInput" type="text" placeholder="ابحث عن قصة..." onkeyup="applyFilters()"
                        style="width:100%;padding:0.6rem 2.5rem 0.6rem 1rem;border:1.5px solid var(--border);border-radius:2rem;background:var(--bg-card);color:var(--text-primary);font-family:inherit;font-size:0.88rem;outline:none;transition:border .2s"
                        onfocus="this.style.borderColor='var(--primary)'" onblur="this.style.borderColor='var(--border)'">
                </div>
            </div>
        </div>

        <div class="stories-grid" id="storiesGrid"></div>

        <div class="pagination-container" id="paginationContainer">
            <div class="pagination-controls">
                <button class="page-btn" onclick="changePage('prev')" id="prevBtn" disabled>
                    <i class="fas fa-chevron-right"></i> السابق
                </button>
                <div class="page-numbers" id="pageNumbers"></div>
                <button class="page-btn" onclick="changePage('next')" id="nextBtn">
                    التالي <i class="fas fa-chevron-left"></i>
                </button>
            </div>
            <div class="page-info" id="pageInfo">عرض 0-0 من 0 قصة</div>
        </div>
    </div>

    <div class="story-modal" id="storyModal">
        <div class="modal-container" id="modalContainer"></div>
    </div>

    <div class="toast-container" id="toastContainer"></div>
    <button class="scroll-top" id="scrollTop" onclick="window.scrollTo({top:0,behavior:'smooth'})"><i class="fas fa-arrow-up"></i></button>

    <footer class="footer"><p>© 2026 CineLingua — جميع الحقوق محفوظة</p></footer>

    <script src="stories-data.js"></script>
    <script>
        let savedStories          = JSON.parse(localStorage.getItem('savedStories')) || [];
        let currentLevel          = 'all';
        let viewingSaved          = false;
        let currentStory          = null;
        let userAnswers           = {};
        let currentPage           = 1;
        const itemsPerPage        = 6;
        let totalPages            = 1;
        let currentDisplayStories = [];

        const READ_TIME_MAP = {
            a1: '2 دقيقة', a2: '3 دقائق',
            b1: '4 دقائق', b2: '5 دقائق',
            c1: '7 دقائق', c2: '9 دقائق'
        };

        const LEVEL_LABELS = {
            all:'الكل', a1:'A1', a2:'A2', b1:'B1', b2:'B2', c1:'C1', c2:'C2'
        };

        function speakText(text) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'en-US'; u.rate = 0.82; u.pitch = 1.05; u.volume = 1;
            window.speechSynthesis.speak(u);
        }

        function stopSpeaking() { window.speechSynthesis.cancel(); }

        document.addEventListener('DOMContentLoaded', () => {
            updateCounts(); applyFilters();
            window.addEventListener('scroll', () => {
                document.getElementById('scrollTop').classList.toggle('show', window.scrollY > 400);
            });
        });

        function updateCounts() {
            const total = (typeof STORIES_DATA !== 'undefined') ? STORIES_DATA.length : 0;
            document.getElementById('totalStories').textContent = total;
            document.getElementById('savedCount').textContent   = savedStories.length;
            document.getElementById('savedBadge').textContent   = savedStories.length;
        }

        function filterByLevel(level) {
            if (viewingSaved) exitSavedView();
            currentLevel = level;
            document.querySelectorAll('#levelFilters .filter-tab').forEach(t => {
                t.classList.toggle('active', t.textContent.trim() === (LEVEL_LABELS[level] || level));
            });
            applyFilters();
        }

        function applyFilters() {
            if (viewingSaved) { showSavedStories(); return; }
            const data = (typeof STORIES_DATA !== 'undefined') ? STORIES_DATA : [];
            const query = (document.getElementById('searchInput')?.value || '').toLowerCase().trim();
            let filtered = currentLevel === 'all' ? data : data.filter(s => s.level === currentLevel);
            if (query) filtered = filtered.filter(s =>
                s.title.toLowerCase().includes(query) || s.content.toLowerCase().includes(query)
            );
            currentDisplayStories = filtered;
            currentPage = 1; renderGrid(); updatePagination();
        }

        function renderGrid() {
            const grid = document.getElementById('storiesGrid');
            if (!currentDisplayStories.length) {
                grid.innerHTML = `<div class="no-results"><i class="fas fa-search"></i>لا توجد قصص مطابقة</div>`;
                document.getElementById('paginationContainer').style.display = 'none'; return;
            }
            document.getElementById('paginationContainer').style.display = 'flex';
            const start = (currentPage - 1) * itemsPerPage;
            const end   = Math.min(start + itemsPerPage, currentDisplayStories.length);

            document.getElementById('storiesGrid').innerHTML = currentDisplayStories.slice(start, end).map(story => {
                const isSaved  = savedStories.includes(story.id);
                const preview  = story.content.length > 110 ? story.content.substring(0,110) + '...' : story.content;
                const readTime = READ_TIME_MAP[story.level] || '3 دقائق';
                return `
                <div class="story-card ${isSaved ? 'saved' : ''}">
                    <div class="story-img-wrap">
                        <img src="${story.image || 'https://images.unsplash.com/photo-1474932430478-367dbb6832c1?w=400'}" alt="${story.title}" loading="lazy">
                        <span class="story-level-tag">${story.difficulty || story.level}</span>
                    </div>
                    <div class="story-body">
                        <h3 class="story-title">${story.title}</h3>
                        <p class="story-preview">${preview}</p>
                        <div class="story-footer">
                            <span class="story-time"><i class="fas fa-clock"></i> ${readTime}</span>
                            <button class="read-btn" onclick="openStory(${story.id})">
                                <i class="fas fa-book-open"></i> اقرأ
                            </button>
                        </div>
                    </div>
                </div>`;
            }).join('');

            document.getElementById('pageInfo').textContent = `عرض ${start+1}-${end} من ${currentDisplayStories.length} قصة`;
        }

        function updatePagination() {
            totalPages = Math.ceil(currentDisplayStories.length / itemsPerPage);
            document.getElementById('prevBtn').disabled = currentPage === 1;
            document.getElementById('nextBtn').disabled = currentPage === totalPages;
            const pn = document.getElementById('pageNumbers');
            pn.innerHTML = '';
            let s = Math.max(1, currentPage - 2), e = Math.min(totalPages, s + 4);
            if (e - s < 4) s = Math.max(1, e - 4);
            if (s > 1) { addPageBtn(pn,1); if(s>2) addDots(pn); }
            for (let i = s; i <= e; i++) addPageBtn(pn, i);
            if (e < totalPages) { if(e<totalPages-1) addDots(pn); addPageBtn(pn, totalPages); }
        }

        function addPageBtn(container, num) {
            const btn = document.createElement('button');
            btn.className = `page-number ${num===currentPage?'active':''}`;
            btn.textContent = num; btn.onclick = () => goToPage(num);
            container.appendChild(btn);
        }

        function addDots(container) {
            const s = document.createElement('span');
            s.className = 'page-number'; s.textContent = '...';
            s.style.cssText = 'border:none;cursor:default;opacity:0.4;';
            container.appendChild(s);
        }

        function changePage(dir) {
            if (dir==='prev' && currentPage>1) currentPage--;
            else if (dir==='next' && currentPage<totalPages) currentPage++;
            renderGrid(); updatePagination(); window.scrollTo({top:0,behavior:'smooth'});
        }

        function goToPage(page) { currentPage=page; renderGrid(); updatePagination(); window.scrollTo({top:0,behavior:'smooth'}); }

        function showSavedStories() {
            viewingSaved = true;
            document.getElementById('savedBtn').classList.add('active-saved');
            const data = (typeof STORIES_DATA !== 'undefined') ? STORIES_DATA : [];
            if (!savedStories.length) {
                document.getElementById('storiesGrid').innerHTML = `
                    <div class="empty-saved">
                        <i class="fas fa-bookmark"></i>
                        <h3>لا توجد قصص محفوظة</h3>
                        <p>افتح أي قصة واضغط "حفظ القصة"</p>
                        <button class="back-btn" onclick="exitSavedView()"><i class="fas fa-arrow-right"></i> رجوع</button>
                    </div>`;
                document.getElementById('paginationContainer').style.display = 'none'; return;
            }
            currentDisplayStories = data.filter(s => savedStories.includes(s.id));
            currentPage = 1; renderGrid(); updatePagination();
        }

        function exitSavedView() {
            viewingSaved = false;
            document.getElementById('savedBtn').classList.remove('active-saved');
            applyFilters();
        }

        function toggleSave(storyId) {
            const wasSaved = savedStories.includes(storyId);
            savedStories = wasSaved ? savedStories.filter(id=>id!==storyId) : [...savedStories, storyId];
            localStorage.setItem('savedStories', JSON.stringify(savedStories));
            updateCounts();
            showToast(wasSaved ? 'تم إلغاء الحفظ' : 'تم حفظ القصة', wasSaved ? 'info' : 'success');
            const btn = document.querySelector('.modal-save-btn');
            if (btn) {
                const now = savedStories.includes(storyId);
                btn.classList.toggle('saved', now);
                btn.innerHTML = `<i class="fas fa-bookmark"></i> ${now ? 'تم الحفظ' : 'حفظ القصة'}`;
            }
            viewingSaved ? showSavedStories() : renderGrid();
        }

        function openStory(storyId) {
            const data = (typeof STORIES_DATA !== 'undefined') ? STORIES_DATA : [];
            currentStory = data.find(s => s.id === storyId);
            if (!currentStory) return;
            userAnswers = {};
            const isSaved = savedStories.includes(currentStory.id);

            let questionsHTML = '';
            if (currentStory.questions?.length) {
                questionsHTML = `
                <div class="questions-section">
                    <h3><i class="fas fa-question-circle"></i> أسئلة الفهم</h3>
                    ${currentStory.questions.map((q, qi) => `
                        <div class="question-item" id="qi-${currentStory.id}-${qi}">
                            <div class="question-text">${qi+1}. ${q.question}</div>
                            <div class="options-grid">
                                ${q.options.map((opt, oi) => `
                                    <div class="option" onclick="selectOpt(${currentStory.id},${qi},${oi},this)">
                                        <span class="opt-letter">${String.fromCharCode(65+oi)}</span>
                                        <span>${opt}</span>
                                    </div>`).join('')}
                            </div>
                            <div class="explanation" id="exp-${currentStory.id}-${qi}">
                                ${q.explanation || 'الإجابة الصحيحة: ' + q.options[q.correct]}
                            </div>
                        </div>`).join('')}
                    <button class="btn-check" onclick="checkAnswers(${currentStory.id})">
                        <i class="fas fa-check-circle"></i> تحقق من الإجابات
                    </button>
                </div>`;
            }

            const escapedContent = currentStory.content.replace(/\\/g,'\\\\').replace(/`/g,'\\`');

            document.getElementById('modalContainer').innerHTML = `
                <div class="modal-topbar">
                    <button class="modal-close-btn" onclick="closeStory()"><i class="fas fa-times"></i></button>
                    <span class="modal-level-badge">${currentStory.difficulty || currentStory.level}</span>
                </div>
                <div class="modal-hero">
                    <img src="${currentStory.image}" alt="${currentStory.title}" loading="lazy">
                    <div class="modal-hero-overlay"></div>
                    <div class="modal-hero-title">${currentStory.title}</div>
                </div>
                <div class="audio-row">
                    <button class="audio-btn play" onclick="speakText(\`${escapedContent}\`)">
                        <i class="fas fa-play"></i> استمع للقصة
                    </button>
                    <button class="audio-btn stop" onclick="stopSpeaking()">
                        <i class="fas fa-stop"></i> إيقاف
                    </button>
                </div>
                <div class="modal-story-text">${currentStory.content}</div>
                <button class="translation-toggle" onclick="toggleTranslation()">
                    <i class="fas fa-language"></i> إظهار الترجمة
                </button>
                <div class="modal-translation" id="storyTranslation">${currentStory.arabic}</div>
                ${questionsHTML}
                <div class="modal-actions">
                    <button class="modal-save-btn ${isSaved?'saved':''}" onclick="toggleSave(${currentStory.id})">
                        <i class="fas fa-bookmark"></i> ${isSaved?'تم الحفظ':'حفظ القصة'}
                    </button>
                </div>`;

            document.getElementById('storyModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeStory() {
            stopSpeaking();
            document.getElementById('storyModal').classList.remove('active');
            document.body.style.overflow = '';
            currentStory = null;
        }

        function toggleTranslation() { document.getElementById('storyTranslation')?.classList.toggle('show'); }

        function selectOpt(storyId, qi, oi, el) {
            if (el.classList.contains('locked')) return;
            if (!userAnswers[storyId]) userAnswers[storyId] = {};
            userAnswers[storyId][qi] = oi;
            document.querySelectorAll(`#qi-${storyId}-${qi} .option`).forEach(o => o.classList.remove('selected'));
            el.classList.add('selected');
        }

        function checkAnswers(storyId) {
            const data  = (typeof STORIES_DATA !== 'undefined') ? STORIES_DATA : [];
            const story = data.find(s => s.id === storyId);
            if (!story?.questions) return;
            story.questions.forEach((q, qi) => {
                const selected = userAnswers[storyId]?.[qi];
                const opts = document.querySelectorAll(`#qi-${storyId}-${qi} .option`);
                opts.forEach(o => { o.classList.remove('correct','wrong'); o.classList.add('locked'); });
                if (selected !== undefined) {
                    opts[selected].classList.add(selected===q.correct ? 'correct' : 'wrong');
                    if (selected !== q.correct) opts[q.correct].classList.add('correct');
                } else {
                    opts[q.correct].classList.add('correct');
                }
                document.getElementById(`exp-${storyId}-${qi}`)?.classList.add('show');
            });
        }

        function showToast(msg, type='info') {
            const tc = document.getElementById('toastContainer');
            const t  = document.createElement('div');
            t.className = `toast ${type}`;
            t.innerHTML = `<i class="fas fa-${type==='success'?'check':'info-circle'}"></i> ${msg}`;
            tc.appendChild(t);
            setTimeout(() => { t.style.animation='toastOut 0.3s ease forwards'; setTimeout(()=>t.remove(),300); }, 2200);
        }

        // ===== I18N =====
        const i18n = {
            ar: { 'nav-home':'الرئيسية','nav-lessons':'الكلمات','nav-stories':'القصص','nav-tenses':'الأزمنة','nav-quiz':'الاختبارات','nav-download':'تحميل التطبيق','s-title':'الإعدادات','s-appearance':'المظهر','s-light':'فاتح','s-dark':'داكن','s-lang':'اللغة','s-notif':'الإشعارات','s-notif-status':'حالة الإشعارات','s-notif-btn':'تفعيل الإشعارات','notif-granted':'مفعّلة ✓','notif-denied':'محظورة','notif-default':'غير محددة','page-title':'القصص القصيرة','footer-txt':'© 2026 CineLingua — جميع الحقوق محفوظة' },
            en: { 'nav-home':'Home','nav-lessons':'Words','nav-stories':'Stories','nav-tenses':'Tenses','nav-quiz':'Quiz','nav-download':'Download App','s-title':'Settings','s-appearance':'Appearance','s-light':'Light','s-dark':'Dark','s-lang':'Language','s-notif':'Notifications','s-notif-status':'Notification Status','s-notif-btn':'Enable Notifications','notif-granted':'Enabled ✓','notif-denied':'Blocked','notif-default':'Not Set','page-title':'Short Stories','footer-txt':'© 2026 CineLingua — All Rights Reserved' }
        };
        let currentLang = localStorage.getItem('cl-lang') || 'ar';
        function tr(k) { return i18n[currentLang][k] || i18n['ar'][k] || k; }
        function applyLang() {
            const lang = currentLang;
            document.documentElement.lang = lang; document.documentElement.dir = lang==='ar'?'rtl':'ltr';
            Object.keys(i18n[lang]).forEach(id => { const el=document.getElementById(id); if(el) el.innerHTML=i18n[lang][id]; });
            document.getElementById('lang-ar')?.classList.toggle('active', lang==='ar');
            document.getElementById('lang-en')?.classList.toggle('active', lang==='en');
        }
        function setLang(lang) { currentLang=lang; localStorage.setItem('cl-lang',lang); applyLang(); }

        // ===== SETTINGS =====
        function openSettings() { document.getElementById('settingsOverlay').classList.add('show'); document.getElementById('settingsPanel').classList.add('show'); refreshNotifBadge(); }
        function closeSettings() { document.getElementById('settingsOverlay').classList.remove('show'); document.getElementById('settingsPanel').classList.remove('show'); }
        function refreshNotifBadge() {
            const perm = Notification.permission, badge = document.getElementById('notifBadge'), btn = document.getElementById('notifActionBtn');
            badge.className = 'notif-badge ' + perm;
            badge.textContent = perm==='granted' ? tr('notif-granted') : perm==='denied' ? tr('notif-denied') : tr('notif-default');
            if (perm==='granted') { btn.disabled=true; document.getElementById('s-notif-btn').textContent=tr('notif-granted'); }
            else if (perm==='denied') { btn.disabled=true; document.getElementById('s-notif-btn').textContent=tr('notif-denied'); }
            else { btn.disabled=false; document.getElementById('s-notif-btn').textContent=tr('s-notif-btn'); }
        }
        async function requestNotifSettings() {
            const r = await Notification.requestPermission(); refreshNotifBadge();
            if (r==='granted' && 'serviceWorker' in navigator) navigator.serviceWorker.ready.then(reg => reg.showNotification('CineLingua 🎓', { body: currentLang==='ar'?'تم تفعيل الإشعارات! 🔔':'Notifications enabled! 🔔', icon:'https://i.postimg.cc/J4xdc62M/20260305-233826.png', vibrate:[200,100,200] }));
        }

        function toggleMenu() { document.getElementById('navMenu').classList.toggle('show'); }
        document.querySelectorAll('.nav-menu a').forEach(a =>
            a.addEventListener('click', () => document.getElementById('navMenu').classList.remove('show'))
        );

        window.setTheme = function(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            document.querySelectorAll('.theme-btn').forEach(b => {
                b.classList.toggle('active',
                    (theme==='light' && b.innerHTML.includes('sun')) ||
                    (theme==='dark'  && b.innerHTML.includes('moon'))
                );
            });
            document.getElementById('btn-light')?.classList.toggle('active', theme==='light');
            document.getElementById('btn-dark')?.classList.toggle('active', theme==='dark');
        };
        setTheme(localStorage.getItem('theme') || 'light');
        applyLang();
    </script>

        async function _saveToken() {
            try {
                if (!_msg || Notification.permission !== "granted") return;
                const token = await _msg.getToken({ vapidKey: VAPID });
                if (!token) return;
                const db = firebase.firestore();
                await db.collection("fcmTokens").doc(token).set({
                    token,
                    page: window.location.pathname,
                    lastSeen: firebase.firestore.FieldValue.serverTimestamp()
                }, { merge: true });
                console.log("✅ FCM Token saved");
            } catch(e) { console.log("FCM:", e.message); }
        }

        window.addEventListener("load", () => {
            if (Notification.permission === "granted") setTimeout(_saveToken, 3000);
        });

        window.saveFCMTokenAfterPermission = _saveToken;
    })();
