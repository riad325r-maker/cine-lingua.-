<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineLingua | قصص قصيرة</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .page-header { text-align: center; margin-bottom: 3rem; }
        .page-header h1 { font-size: 3rem; background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .level-filter { display: flex; justify-content: center; gap: 1rem; margin-bottom: 3rem; flex-wrap: wrap; }
        .filter-btn { padding: 0.75rem 2rem; border: 2px solid var(--border); background: transparent; border-radius: var(--radius-full); cursor: pointer; font-weight: 600; color: var(--gray); transition: var(--transition); }
        .filter-btn:hover { border-color: var(--primary); color: var(--primary); }
        .filter-btn.active { background: linear-gradient(135deg, var(--primary), var(--secondary)); border-color: transparent; color: white; }
        .story-card { background: white; border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 2rem; box-shadow: var(--shadow); border: 2px solid transparent; transition: var(--transition); }
        [data-theme="dark"] .story-card { background: var(--bg-card); }
        .story-card:hover { transform: translateY(-5px); border-color: var(--primary); box-shadow: var(--shadow-lg); }
        .story-header { height: 200px; overflow: hidden; }
        .story-header img { width: 100%; height: 100%; object-fit: cover; transition: var(--transition); }
        .story-card:hover .story-header img { transform: scale(1.05); }
        .story-content { padding: 2rem; }
        .story-title { font-size: 1.8rem; color: var(--primary); margin-bottom: 0.5rem; }
        .story-preview { line-height: 1.8; margin-bottom: 1.5rem; padding: 1rem; background: #f8fafc; border-radius: var(--radius-md); border-right: 4px solid var(--primary); }
        [data-theme="dark"] .story-preview { background: var(--bg-secondary); }
        .story-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 1.5rem; padding-top: 1.5rem; border-top: 2px solid var(--border); }
        .read-more-btn { padding: 0.75rem 2rem; border: none; border-radius: var(--radius-full); background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; font-weight: 600; cursor: pointer; transition: var(--transition); }
        .read-more-btn:hover { transform: translateX(-5px); box-shadow: var(--shadow-lg); }
        .story-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 2000; opacity: 0; visibility: hidden; transition: var(--transition); }
        .story-modal.active { opacity: 1; visibility: visible; }
        .story-modal-content { background: white; border-radius: var(--radius-lg); width: 90%; max-width: 800px; max-height: 90vh; overflow-y: auto; padding: 2rem; position: relative; }
        [data-theme="dark"] .story-modal-content { background: var(--bg-card); }
        .story-modal-close { position: absolute; top: 1rem; left: 1rem; background: none; border: none; font-size: 1.5rem; color: var(--gray); cursor: pointer; }
        .btn-check { padding: 1rem 2rem; background: var(--primary); color: white; border: none; border-radius: var(--radius-full); cursor: pointer; margin-top: 1rem; }
        .completion-badge { display: inline-block; padding: 0.5rem 1rem; background: var(--success); color: white; border-radius: var(--radius-full); margin-top: 1rem; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo"><i class="fas fa-film"></i><span>CineLingua</span></div>
            <ul class="nav-menu">
                <li><a href="index.html">الرئيسية</a></li>
                <li><a href="lessons.html">الكلمات</a></li>
                <li><a href="stories.html" class="active">القصص</a></li>
                <li><a href="quiz.html">الاختبارات</a></li>
            </ul>
            <div class="theme-toggle">...</div>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1>📖 قصص قصيرة</h1>
            <p>اقرأ القصص وتعلم كلمات جديدة</p>
        </div>

        <div class="level-filter">
            <button class="filter-btn active" onclick="filterStories('all')">الكل</button>
            <button class="filter-btn" onclick="filterStories('مبتدئ')">مبتدئ</button>
            <button class="filter-btn" onclick="filterStories('متوسط')">متوسط</button>
        </div>

        <div id="storiesList"></div>
    </div>

    <div class="story-modal" id="storyModal">
        <div class="story-modal-content" id="storyModalContent"></div>
    </div>

    <script src="stories-data.js"></script>
    <script src="theme.js"></script>
    <script>
        let readingProgress = JSON.parse(localStorage.getItem('readingProgress')) || {};

        function filterStories(level) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            displayStories(level);
        }

        function displayStories(level = 'all') {
            let stories = level === 'all' ? STORIES : STORIES.filter(s => s.level === level);
            document.getElementById('storiesList').innerHTML = stories.map(story => `
                <div class="story-card">
                    <div class="story-header"><img src="${story.image}" alt=""></div>
                    <div class="story-content">
                        <h2 class="story-title">${story.title}</h2>
                        <div class="story-preview">${story.content.substring(0, 150)}...</div>
                        <button class="read-more-btn" onclick="openStory(${story.id})">اقرأ القصة</button>
                    </div>
                </div>
            `).join('');
        }

        function openStory(id) {
            let story = STORIES.find(s => s.id === id);
            let modal = document.getElementById('storyModal');
            document.getElementById('storyModalContent').innerHTML = `
                <button class="story-modal-close" onclick="closeStory()">✕</button>
                <h2>${story.title}</h2>
                <p>${story.content}</p>
                <h3>📝 أسئلة</h3>
                ${story.questions.map((q, i) => `
                    <div><p>${q.question}</p>
                    ${q.options.map((o, j) => `<button onclick="checkAnswer(${i}, ${j}, ${q.correct}, ${story.id})">${o}</button>`).join('')}
                    </div>
                `).join('')}
                <div id="result"></div>
            `;
            modal.classList.add('active');
        }

        function closeStory() {
            document.getElementById('storyModal').classList.remove('active');
        }

        displayStories();
    </script>
</body>
</html>
