<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="verbsTitle">CineLingua | تصاريف الأفعال</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6366f1">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/J4xdc62M/20260305-233826.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <!-- PAGE HEADER -->
        <div class="page-header">
            <h1 id="page-title-el" data-i18n="verbsTitle">تصاريف الأفعال</h1>
            <div class="header-actions">
                <div class="quick-stats">
                    <div class="quick-stat"><i class="fas fa-language"></i><span><span class="qs-val" id="totalCount">0</span> <span id="lbl-total-el" data-i18n="lbl-total">فعل</span></span></div>
                    <div class="quick-stat"><i class="fas fa-check-circle"></i><span><span class="qs-val" id="learnedCount">0</span> <span data-i18n="lbl-learned">مكتملة</span></span></div>
                    <div class="quick-stat"><i class="fas fa-bookmark"></i><span><span class="qs-val" id="savedCount">0</span> <span data-i18n="lbl-saved">محفوظة</span></span></div>
                </div>
            </div>
        </div>

        <!-- DAILY VERB -->
        <div class="daily-banner" id="dailyBanner">
            <span class="daily-tag" data-i18n="daily-tag">فعل اليوم</span>
            <span class="daily-v1" id="dailyV1">—</span>
            <span class="daily-ar" id="dailyAr"></span>
            <button class="daily-verb-btn" onclick="playVerb(dailyVerb.v1)"><i class="fas fa-volume-up"></i> <span data-i18n="btn-listen">استمع</span></button>
            <button class="daily-verb-btn" onclick="learnDailyVerb()"><i class="fas fa-check"></i> <span data-i18n="btn-learned-it">تعلمتها</span></button>
        </div>

        <!-- SEARCH -->
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" data-i18n-placeholder="search-placeholder" placeholder="ابحث عن فعل...">
        </div>

        <!-- FILTERS -->
        <div class="filters-container">
            <div class="filter-row">
                <div class="filter-group">
                    <span class="filter-label" data-i18n="lbl-type">النوع:</span>
                    <div class="filter-tabs">
                        <button class="filter-tab active" onclick="setFilter('all',this)" data-i18n="filter-all">الكل</button>
                        <button class="filter-tab" onclick="setFilter('irregular',this)" data-i18n="filter-irregular">⚡ شاذة</button>
                        <button class="filter-tab" onclick="setFilter('regular',this)" data-i18n="filter-regular">✅ منتظمة</button>
                    </div>
                </div>
                <div class="action-btns-row">
                    <button class="saved-btn" onclick="showSaved()">
                        <i class="fas fa-bookmark"></i> <span data-i18n="btn-saved-list">المحفوظات</span>
                        <span class="saved-badge" id="savedBadge">0</span>
                    </button>
                    <button class="saved-btn green" onclick="showLearned()">
                        <i class="fas fa-check-circle"></i> <span data-i18n="btn-learned-list">المكتملة</span>
                        <span class="saved-badge" id="learnedBadge">0</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- GRID -->
        <div class="verbs-grid" id="verbsGrid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 1.2rem;"></div>

        <!-- PAGINATION -->
        <div class="pagination-container" id="paginationContainer">
            <div class="pagination-controls">
                <button class="page-btn" onclick="changePage('prev')" id="prevBtn" disabled><i class="fas fa-chevron-right"></i> <span data-i18n="btn-prev">السابق</span></button>
                <div class="page-numbers" id="pageNumbers"></div>
                <button class="page-btn" onclick="changePage('next')" id="nextBtn"><span data-i18n="btn-next">التالي</span> <i class="fas fa-chevron-left"></i></button>
            </div>
            <div class="page-info" id="pageInfo"></div>
        </div>
    </div>

    <!-- TOAST -->
    <div class="toast-container" id="toastContainer"></div>

    <button class="scroll-top" id="scrollTop" onclick="window.scrollTo({top:0,behavior:'smooth'})"><i class="fas fa-arrow-up"></i></button>

    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-messaging-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
    <script src="verbs-data.js"></script>
    <script src="translation.js"></script>
    <script src="core.js"></script>
    <script>
        let savedVerbs   = JSON.parse(localStorage.getItem('savedVerbs'))   || [];
        let learnedVerbs = JSON.parse(localStorage.getItem('learnedVerbs')) || [];
        let currentFilter    = 'all';
        let currentSearch    = '';
        let viewingSaved     = false;
        let viewingLearned   = false;
        let currentPage      = 1;
        const PER_PAGE       = 30;
        let displayData      = [];
        let dailyVerb        = null;
        let selectedVoice    = null;

        function loadVoices() {
            const voices = window.speechSynthesis.getVoices();
            selectedVoice = voices.find(v => v.lang==='en-US' && v.name.toLowerCase().includes('google')) || voices.find(v => v.lang==='en-US') || voices[0];
        }
        window.speechSynthesis.onvoiceschanged = loadVoices;
        if (window.speechSynthesis.getVoices().length > 0) loadVoices();

        function playVerb(word, rate=1.0) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(word);
            u.lang='en-US'; u.rate=rate; u.pitch=1; u.volume=1;
            if (selectedVoice) u.voice=selectedVoice;
            window.speechSynthesis.speak(u);
        }

        function setDailyVerb() {
            dailyVerb = VERBS_DATA[Math.floor(Date.now()/86400000) % VERBS_DATA.length];
            document.getElementById('dailyV1').textContent = dailyVerb.v1;
            const dailyArEl = document.getElementById('dailyAr'); if(dailyArEl){ dailyArEl.textContent = (localStorage.getItem('cl-language') || 'ar') ==='en' ? '' : dailyVerb.ar; }
        }

        function learnDailyVerb() { markLearned(dailyVerb.id); showToast(t('toast-daily'), 'success'); }

        function setFilter(f, btn) { if (viewingSaved || viewingLearned) exitSpecial(); currentFilter = f; document.querySelectorAll('.filter-tab').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); applyFilters(); }

        function applyFilters() {
            let data = [...VERBS_DATA];
            if (currentFilter === 'irregular') data = data.filter(v=>v.type==='irregular');
            if (currentFilter === 'regular')   data = data.filter(v=>v.type==='regular');
            if (currentSearch.length >= 1) { const q = currentSearch.toLowerCase(); data = data.filter(v => v.v1.includes(q)||v.v2.includes(q)||v.v3.includes(q)||v.ar.includes(q)); }
            displayData = data; currentPage = 1; renderPage(); updatePagination();
        }

        function renderPage() {
            const grid = document.getElementById('verbsGrid'); const isEN = (localStorage.getItem('cl-language') || 'ar') === 'en';
            if (!displayData.length) { grid.innerHTML = `<div class="no-results"><i class="fas fa-search" style="font-size:2rem;margin-bottom:0.5rem;display:block;"></i>${t('no-results')}</div>`; document.getElementById('paginationContainer').style.display = 'none'; return; }
            document.getElementById('paginationContainer').style.display = 'flex';
            const start = (currentPage-1)*PER_PAGE; const end = Math.min(start+PER_PAGE, displayData.length); const page = displayData.slice(start, end);

            grid.innerHTML = page.map(v => {
                const isSaved = savedVerbs.includes(v.id); const isLearned = learnedVerbs.includes(v.id); const isIrr = v.type === 'irregular';
                return `<div class="cl-card verb-card ${isSaved?'saved':''} ${isLearned?'learned':''}" style="padding: 1.3rem;">
                    ${isIrr ? `<span class="irregular-ribbon" style="position: absolute; top: 10px; left: 10px; background: linear-gradient(135deg, #f59e0b, #ef4444); color: white; font-size: 0.66rem; font-weight: 700; padding: 0.18rem 0.55rem; border-radius: 100px;">${t('irregular-lbl')}</span>` : ''}
                    <span class="learned-ribbon" style="position: absolute; top: 10px; left: 10px; background: var(--gradient); color: white; font-size: 0.66rem; font-weight: 700; padding: 0.18rem 0.55rem; border-radius: 100px; display: ${isLearned ? 'inline-block' : 'none'};">${t('learned-lbl')}</span>
                    <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.75rem;">
                        <span style="font-size: 1.75rem; font-weight: 800; color: var(--primary); line-height: 1;">${v.v1}</span>
                        ${!isEN ? `<span style="font-size: 1rem; color: var(--text-secondary); background: var(--bg-secondary); padding: 0.2rem 0.65rem; border-radius: 2rem; font-weight: 600;">${v.ar}</span>` : ''}
                    </div>
                    <div style="display: flex; gap: 0.5rem; margin-bottom: 0.85rem; flex-wrap: wrap;">
                        <div style="display: flex; flex-direction: column; gap: 0.1rem; background: var(--bg-secondary); padding: 0.45rem 0.75rem; border-radius: 0.7rem; flex: 1; min-width: 80px;"><span style="font-size: 0.65rem; font-weight: 700; color: var(--text-secondary);">${t('form-v1')}</span><span style="font-size: 0.9rem; font-weight: 700;">${v.v1}</span></div>
                        <div style="display: flex; flex-direction: column; gap: 0.1rem; background: var(--bg-secondary); padding: 0.45rem 0.75rem; border-radius: 0.7rem; flex: 1; min-width: 80px;"><span style="font-size: 0.65rem; font-weight: 700; color: var(--text-secondary);">${t('form-v2')}</span><span style="font-size: 0.9rem; font-weight: 700; color: #7c3aed;">${v.v2}</span></div>
                        <div style="display: flex; flex-direction: column; gap: 0.1rem; background: var(--bg-secondary); padding: 0.45rem 0.75rem; border-radius: 0.7rem; flex: 1; min-width: 80px;"><span style="font-size: 0.65rem; font-weight: 700; color: var(--text-secondary);">${t('form-v3')}</span><span style="font-size: 0.9rem; font-weight: 700; color: #db2777;">${v.v3}</span></div>
                    </div>
                    <div style="background: var(--bg-secondary); padding: 0.8rem 1rem; border-radius: 0.85rem; margin-bottom: 0.85rem; border-right: 3px solid var(--primary);">
                        <div style="font-weight: 600; font-size: 0.9rem; color: var(--text-primary);">"${v.ex}"</div>
                        ${!isEN ? `<div style="color: var(--text-secondary); font-size: 0.83rem; margin-top: 0.3rem;">${v.exAr}</div>` : ''}
                    </div>
                    <div class="card-actions">
                        <button class="action-btn listen" onclick="playVerb('${v.v1.replace(/'/g, "\\'")}')"><i class="fas fa-volume-up"></i> ${t('btn-listen')}</button>
                        <button class="action-btn listen-slow" onclick="playVerb('${v.v1.replace(/'/g, "\\'")}',0.5)"><i class="fas fa-ear-listen"></i> ${t('btn-listen-slow')}</button>
                        <button class="action-btn save-btn ${isSaved?'active':''}" onclick="toggleSave(${v.id})"><i class="fas fa-bookmark"></i> ${isSaved?t('btn-saved'):t('btn-save')}</button>
                        <button class="action-btn learn-btn ${isLearned?'active':''}" onclick="markLearned(${v.id})"><i class="fas fa-${isLearned?'check-circle':'graduation-cap'}"></i> ${isLearned?t('btn-learned'):t('btn-learn')}</button>
                    </div>
                </div>`;
            }).join('');

            const total = displayData.length; document.getElementById('pageInfo').textContent = isEN ? `Showing ${start+1}–${end} of ${total} verbs` : `عرض ${start+1}–${end} من ${total} فعل`; updateCounts();
        }

        function updatePagination() { const total = Math.ceil(displayData.length/PER_PAGE); document.getElementById('prevBtn').disabled = currentPage===1; document.getElementById('nextBtn').disabled = currentPage===total; const pn = document.getElementById('pageNumbers'); pn.innerHTML = ''; const s=Math.max(1,currentPage-2), e=Math.min(total,currentPage+2); if(s>1){addPBtn(pn,1);if(s>2)addDots(pn);} for(let i=s;i<=e;i++)addPBtn(pn,i); if(e<total){if(e<total-1)addDots(pn);addPBtn(pn,total);} }
        function addPBtn(c,n){const b=document.createElement('button');b.className=`page-number${n===currentPage?' active':''}`;b.textContent=n;b.onclick=()=>goPage(n);c.appendChild(b);}
        function addDots(c){const s=document.createElement('span');s.className='page-number';s.textContent='...';s.style.cssText='border:none;cursor:default;opacity:0.4;';c.appendChild(s);}
        function changePage(d){if(d==='prev'&&currentPage>1)currentPage--;else if(d==='next')currentPage++;renderPage();updatePagination();window.scrollTo({top:0,behavior:'smooth'});}
        function goPage(p){currentPage=p;renderPage();updatePagination();window.scrollTo({top:0,behavior:'smooth'});}

        function toggleSave(id) { const was = savedVerbs.includes(id); savedVerbs = was ? savedVerbs.filter(x=>x!==id) : [...savedVerbs,id]; localStorage.setItem('savedVerbs', JSON.stringify(savedVerbs)); showToast(was?t('toast-unsaved'):t('toast-saved'), was?'warning':'success'); viewingSaved ? showSaved() : renderPage(); }
        function markLearned(id) { const was = learnedVerbs.includes(id); learnedVerbs = was ? learnedVerbs.filter(x=>x!==id) : [...learnedVerbs,id]; localStorage.setItem('learnedVerbs', JSON.stringify(learnedVerbs)); showToast(was?t('toast-unlearned'):t('toast-learned'), was?'info':'success'); viewingLearned ? showLearned() : renderPage(); }

        function showSaved() { viewingSaved=true; viewingLearned=false; const data = VERBS_DATA.filter(v=>savedVerbs.includes(v.id)); if(!data.length){ document.getElementById('verbsGrid').innerHTML=`<div class="empty-state"><i class="fas fa-bookmark"></i><h3>${t('empty-saved-h')}</h3><p>${t('empty-saved-p')}</p><button class="back-btn" onclick="exitSpecial()">${t('btn-back')}</button></div>`; document.getElementById('paginationContainer').style.display='none'; return; } displayData=data; currentPage=1; renderPage(); updatePagination(); }
        function showLearned() { viewingLearned=true; viewingSaved=false; const data = VERBS_DATA.filter(v=>learnedVerbs.includes(v.id)); if(!data.length){ document.getElementById('verbsGrid').innerHTML=`<div class="empty-state"><i class="fas fa-graduation-cap"></i><h3>${t('empty-learned-h')}</h3><p>${t('empty-learned-p')}</p><button class="back-btn" onclick="exitSpecial()">${t('btn-back')}</button></div>`; document.getElementById('paginationContainer').style.display='none'; return; } displayData=data; currentPage=1; renderPage(); updatePagination(); }
        function exitSpecial(){viewingSaved=false;viewingLearned=false;applyFilters();}

        function updateCounts() { document.getElementById('totalCount').textContent = VERBS_DATA.length; document.getElementById('savedCount').textContent = savedVerbs.length; document.getElementById('learnedCount').textContent = learnedVerbs.length; }
        function showToast(msg, type='info') { const tc = document.getElementById('toastContainer'); const el = document.createElement('div'); el.className=`toast ${type}`; el.innerHTML=`<i class="fas fa-${type==='success'?'check':type==='warning'?'times':'info-circle'}"></i> ${msg}`; tc.appendChild(el); setTimeout(()=>{el.style.animation='toastOut 0.3s ease forwards';setTimeout(()=>el.remove(),300);},2200); }

        document.getElementById('searchInput').addEventListener('input', e=>{ if(viewingSaved||viewingLearned)exitSpecial(); currentSearch=e.target.value; applyFilters(); });
        window.addEventListener('scroll',()=>{ document.getElementById('scrollTop').classList.toggle('show',window.scrollY>400); });
        window.addEventListener('languageChanged', renderPage);

        setDailyVerb(); applyFilters();
    </script>
</body>
</html>
