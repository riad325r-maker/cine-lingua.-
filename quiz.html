<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineLingua | الاختبارات</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .quiz-container { max-width: 800px; margin: 100px auto 2rem; padding: 0 2rem; }
        .quiz-header { text-align: center; margin-bottom: 3rem; }
        .quiz-header h1 { font-size: 3rem; background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .quiz-card { background: white; border-radius: var(--radius-lg); padding: 2rem; box-shadow: var(--shadow-lg); border: 2px solid var(--border-light); }
        [data-theme="dark"] .quiz-card { background: var(--bg-card); }
        .quiz-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; padding: 1rem; background: var(--bg-secondary); border-radius: var(--radius-md); }
        .progress-bar { width: 100%; height: 8px; background: var(--border-light); border-radius: var(--radius-full); overflow: hidden; margin: 1rem 0; }
        .progress-fill { height: 100%; background: linear-gradient(135deg, var(--primary), var(--secondary)); transition: width 0.3s ease; }
        .question-text { font-size: 1.5rem; font-weight: 700; margin-bottom: 2rem; padding: 1.5rem; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; border-radius: var(--radius-lg); text-align: center; }
        .options-grid { display: grid; gap: 1rem; margin-bottom: 2rem; }
        .option-item { padding: 1.25rem; border: 2px solid var(--border-light); border-radius: var(--radius-md); cursor: pointer; transition: var(--transition); display: flex; align-items: center; gap: 1rem; background: var(--bg-primary); }
        [data-theme="dark"] .option-item { background: var(--bg-secondary); }
        .option-item:hover { border-color: var(--primary); transform: translateY(-2px); }
        .option-item.selected { border-color: var(--primary); background: linear-gradient(135deg, rgba(99,102,241,0.1), rgba(236,72,153,0.1)); }
        .option-prefix { width: 35px; height: 35px; border-radius: 50%; background: var(--bg-tertiary); display: flex; align-items: center; justify-content: center; font-weight: 700; }
        .question-footer { display: flex; justify-content: space-between; margin-top: 2rem; padding-top: 2rem; border-top: 2px solid var(--border-light); }
        .nav-btn { padding: 0.75rem 1.5rem; border: none; border-radius: var(--radius-full); font-weight: 600; cursor: pointer; transition: var(--transition); display: flex; align-items: center; gap: 0.5rem; }
        .nav-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .nav-prev { background: var(--bg-tertiary); color: var(--text-primary); }
        .nav-next { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; }
        .result-card { background: linear-gradient(135deg, var(--primary), var(--secondary)); border-radius: var(--radius-lg); padding: 3rem; color: white; text-align: center; }
        .result-score { font-size: 5rem; font-weight: 800; margin: 1rem 0; }
        .result-details { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; margin: 2rem 0; }
        .result-stat { background: rgba(255,255,255,0.2); padding: 1.5rem; border-radius: var(--radius-md); }
        .result-actions { display: flex; gap: 1rem; justify-content: center; margin-top: 2rem; }
        .result-btn { padding: 1rem 2rem; border: 2px solid white; background: transparent; color: white; border-radius: var(--radius-full); cursor: pointer; transition: var(--transition); }
        .result-btn:hover { background: white; color: var(--primary); }
        
        /* محددات المستوى ونوع الاختبار */
        .quiz-controls {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        
        .control-btn {
            padding: 0.75rem 1.5rem;
            border: 2px solid var(--border-light);
            background: transparent;
            border-radius: var(--radius-full);
            cursor: pointer;
            font-weight: 600;
            color: var(--text-secondary);
            transition: var(--transition);
        }
        
        .control-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }
        
        .control-btn.active {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-color: transparent;
            color: white;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo"><i class="fas fa-film"></i><span>CineLingua</span></div>
            <ul class="nav-menu">
                <li><a href="index.html">الرئيسية</a></li>
                <li><a href="lessons.html">الكلمات</a></li>
                <li><a href="stories.html">القصص</a></li>
                <li><a href="quiz.html" class="active">الاختبارات</a></li>
            </ul>
            <div class="theme-toggle" id="themeToggle">
                <button class="theme-btn active" onclick="setTheme('light')"><i class="fas fa-sun"></i></button>
                <button class="theme-btn" onclick="setTheme('dark')"><i class="fas fa-moon"></i></button>
            </div>
        </div>
    </nav>

    <div class="quiz-container">
        <div class="quiz-header">
            <h1>📝 اختبر نفسك</h1>
            <p>اختر نوع الاختبار والمستوى المناسب لك</p>
        </div>

        <!-- أزرار التحكم -->
        <div class="quiz-controls">
            <button class="control-btn active" onclick="setQuizType('vocabulary')">مفردات</button>
            <button class="control-btn" onclick="setQuizType('grammar')">قواعد</button>
            <button class="control-btn" onclick="setQuizType('mixed')">اختبار شامل</button>
        </div>
        
        <div class="quiz-controls">
            <button class="control-btn active" onclick="setLevel('beginner')">مبتدئ</button>
            <button class="control-btn" onclick="setLevel('intermediate')">متوسط</button>
            <button class="control-btn" onclick="setLevel('advanced')">متقدم</button>
        </div>

        <div id="quizCard" class="quiz-card">
            <!-- يتم تعبئته بالجافاسكريبت -->
        </div>
    </div>

    <!-- استيراد ملف الأسئلة -->
    <script type="module">
        import { QUIZ_DATA, getQuizQuestions, getMixedQuestions } from 'quiz-data.js';
        import { setTheme } from './theme.js';

        // المتغيرات العامة
        let currentType = 'vocabulary';
        let currentLevel = 'beginner';
        let currentQuestions = [];
        let currentQuestionIndex = 0;
        let userAnswers = [];
        let quizCompleted = false;
        let score = 0;

        // تحميل الصفحة
        document.addEventListener('DOMContentLoaded', () => {
            loadQuiz();
        });

        // تغيير نوع الاختبار
        window.setQuizType = function(type) {
            currentType = type;
            document.querySelectorAll('.control-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            loadQuiz();
        };

        // تغيير المستوى
        window.setLevel = function(level) {
            currentLevel = level;
            document.querySelectorAll('.level-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            loadQuiz();
        };

        // تحميل الأسئلة
        function loadQuiz() {
            if (currentType === 'mixed') {
                currentQuestions = getMixedQuestions(currentLevel, 10);
            } else {
                currentQuestions = getQuizQuestions(currentType, currentLevel);
            }
            
            if (!currentQuestions || currentQuestions.length === 0) {
                document.getElementById('quizCard').innerHTML = `
                    <div class="result-card">
                        <h2>⚠️ لا توجد أسئلة</h2>
                        <p>لم يتم العثور على أسئلة لهذا المستوى</p>
                    </div>
                `;
                return;
            }

            currentQuestionIndex = 0;
            userAnswers = new Array(currentQuestions.length).fill(null);
            quizCompleted = false;
            score = 0;
            displayQuestion();
        }

        // عرض السؤال
        function displayQuestion() {
            if (quizCompleted) {
                showResult();
                return;
            }

            const q = currentQuestions[currentQuestionIndex];
            const progress = ((currentQuestionIndex + 1) / currentQuestions.length) * 100;

            let html = `
                <div class="quiz-info">
                    <span class="progress-text">السؤال ${currentQuestionIndex + 1} من ${currentQuestions.length}</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" style="width: ${progress}%"></div>
                </div>
                <div class="question-text">${q.question}</div>
                <div class="options-grid" id="optionsGrid">
            `;

            q.options.forEach((opt, index) => {
                const isSelected = userAnswers[currentQuestionIndex] === index;
                html += `
                    <div class="option-item ${isSelected ? 'selected' : ''}" onclick="selectOption(${index})">
                        <span class="option-prefix">${String.fromCharCode(65 + index)}</span>
                        <span>${opt}</span>
                    </div>
                `;
            });

            html += `</div>`;

            html += `
                <div class="question-footer">
                    <button class="nav-btn nav-prev" onclick="prevQuestion()" ${currentQuestionIndex === 0 ? 'disabled' : ''}>
                        <i class="fas fa-arrow-right"></i> السابق
                    </button>
                    <button class="nav-btn nav-next" onclick="nextQuestion()">
                        ${currentQuestionIndex === currentQuestions.length - 1 ? 'إنهاء' : 'التالي'} 
                        <i class="fas fa-arrow-left"></i>
                    </button>
                </div>
            `;

            document.getElementById('quizCard').innerHTML = html;
        }

        // اختيار إجابة
        window.selectOption = function(index) {
            userAnswers[currentQuestionIndex] = index;
            displayQuestion();
        };

        // السؤال التالي
        window.nextQuestion = function() {
            if (userAnswers[currentQuestionIndex] === null) {
                alert('الرجاء اختيار إجابة أولاً');
                return;
            }
            
            if (currentQuestionIndex < currentQuestions.length - 1) {
                currentQuestionIndex++;
                displayQuestion();
            } else {
                // حساب النتيجة
                score = userAnswers.reduce((acc, ans, idx) => {
                    return acc + (ans === currentQuestions[idx].correct ? 1 : 0);
                }, 0);
                quizCompleted = true;
                displayQuestion();
            }
        };

        // السؤال السابق
        window.prevQuestion = function() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                displayQuestion();
            }
        };

        // عرض النتيجة
        function showResult() {
            const percentage = Math.round((score / currentQuestions.length) * 100);
            document.getElementById('quizCard').innerHTML = `
                <div class="result-card">
                    <h2>نتيجتك</h2>
                    <div class="result-score">${percentage}%</div>
                    <div class="result-details">
                        <div class="result-stat">
                            <div class="result-stat-value">${score}</div>
                            <div>إجابات صحيحة</div>
                        </div>
                        <div class="result-stat">
                            <div class="result-stat-value">${currentQuestions.length - score}</div>
                            <div>إجابات خاطئة</div>
                        </div>
                    </div>
                    <div class="result-actions">
                        <button class="result-btn" onclick="location.reload()">إعادة الاختبار</button>
                        <button class="result-btn" onclick="window.location.href='lessons.html'">الدروس</button>
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
