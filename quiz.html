<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineLingua | الاختبارات</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .quiz-header { text-align: center; margin-bottom: 3rem; }
        .quiz-header h1 { font-size: 3rem; background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .quiz-card { background: white; border-radius: var(--radius-lg); padding: 2rem; box-shadow: var(--shadow); max-width: 600px; margin: 0 auto; }
        [data-theme="dark"] .quiz-card { background: var(--bg-card); }
        .question-text { font-size: 1.5rem; font-weight: 700; margin-bottom: 2rem; padding: 1.5rem; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; border-radius: var(--radius-lg); text-align: center; }
        .option-item { padding: 1rem; border: 2px solid var(--border); border-radius: var(--radius-md); margin-bottom: 1rem; cursor: pointer; transition: var(--transition); }
        .option-item:hover { border-color: var(--primary); background: #f1f5f9; }
        [data-theme="dark"] .option-item:hover { background: var(--bg-secondary); }
        .option-item.selected { border-color: var(--primary); background: linear-gradient(135deg, rgba(99,102,241,0.1), rgba(236,72,153,0.1)); }
        .btn-next { padding: 1rem 2rem; background: var(--primary); color: white; border: none; border-radius: var(--radius-full); cursor: pointer; font-size: 1.1rem; margin-top: 1rem; }
        .result-card { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; padding: 2rem; border-radius: var(--radius-lg); text-align: center; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo"><i class="fas fa-film"></i><span>CineLingua</span></div>
            <ul class="nav-menu">
                <li><a href="index.html">الرئيسية</a></li>
                <li><a href="lessons.html">الكلمات</a></li>
                <li><a href="stories.html">القصص</a></li>
                <li><a href="quiz.html" class="active">الاختبارات</a></li>
            </ul>
            <div class="theme-toggle">...</div>
        </div>
    </nav>

    <div class="container">
        <div class="quiz-header">
            <h1>📝 اختبر نفسك</h1>
        </div>

        <div id="quizContainer" class="quiz-card">
            <!-- الأسئلة تظهر هنا -->
        </div>
    </div>

    <script src="quiz-data.js"></script>
    <script src="theme.js"></script>
    <script>
        let currentQuestion = 0;
        let score = 0;
        let userAnswers = [];

        function loadQuestion() {
            let q = QUIZ[currentQuestion];
            let html = `<div class="question-text">${q.question}</div>`;
            q.options.forEach((opt, i) => {
                html += `<div class="option-item" onclick="selectOption(${i})">${opt}</div>`;
            });
            html += `<button class="btn-next" onclick="nextQuestion()">التالي</button>`;
            document.getElementById('quizContainer').innerHTML = html;
        }

        function selectOption(index) {
            document.querySelectorAll('.option-item').forEach(el => el.classList.remove('selected'));
            event.target.classList.add('selected');
            userAnswers[currentQuestion] = index;
        }

        function nextQuestion() {
            if (userAnswers[currentQuestion] === QUIZ[currentQuestion].correct) score++;
            currentQuestion++;
            if (currentQuestion < QUIZ.length) loadQuestion();
            else showResult();
        }

        function showResult() {
            document.getElementById('quizContainer').innerHTML = `
                <div class="result-card">
                    <h2>نتيجتك</h2>
                    <p style="font-size:3rem">${score}/${QUIZ.length}</p>
                    <button class="btn-next" onclick="location.reload()">حاول مرة أخرى</button>
                </div>
            `;
        }

        loadQuestion();
    </script>
</body>
</html>
