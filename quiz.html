            let bodyHTML = '';
            if (q.type === 'mcq') {
                bodyHTML = `<div class="options-list" id="optionsList" style="display: flex; flex-direction: column; gap: 0.75rem; margin-bottom: 1.75rem;">${q.options.map((opt,i) => `<div class="option-item ${userAnswers[currentQIndex]===i?'selected':''}" onclick="selectMCQ(${i},this)" style="padding: 1rem 1.25rem; border: 2px solid var(--border); border-radius: 1rem; cursor: pointer; display: flex; align-items: center; gap: 0.9rem; background: var(--bg-card);"><span class="option-letter" style="width: 34px; height: 34px; border-radius: 50%; background: var(--bg-secondary); display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 0.9rem; flex-shrink: 0;">${letters[i]||i}</span><span class="option-text" style="font-size: 0.95rem; font-weight: 500;">${opt}</span><i class="fas fa-check option-feedback-icon" style="margin-right: auto; display: none;"></i></div>`).join('')}</div>`;
            } else if (q.type === 'tf') {
                const ans = userAnswers[currentQIndex];
                bodyHTML = `<div class="tf-options" id="tfOptions" style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 1.75rem;"><div class="tf-option ${ans===true?'selected':''}" onclick="selectTF(true,this)" style="padding: 1rem; border: 2px solid var(--border); border-radius: 1rem; cursor: pointer; text-align: center; font-weight: 700; background: var(--bg-card); display: flex; align-items: center; justify-content: center; gap: 0.5rem;"><i class="fas fa-check"></i> True</div><div class="tf-option ${ans===false?'selected':''}" onclick="selectTF(false,this)" style="padding: 1rem; border: 2px solid var(--border); border-radius: 1rem; cursor: pointer; text-align: center; font-weight: 700; background: var(--bg-card); display: flex; align-items: center; justify-content: center; gap: 0.5rem;"><i class="fas fa-times"></i> False</div></div>`;
            } else if (q.type === 'fill') {
                const prev = userAnswers[currentQIndex] !== undefined ? userAnswers[currentQIndex] : '';
                bodyHTML = `<div class="fill-wrap" style="margin-bottom: 1.75rem; display: flex; flex-direction: column; gap: 0.65rem;">${q.hint ? `<div class="fill-hint" style="font-size: 0.82rem; color: var(--text-secondary); font-style: italic;"><i class="fas fa-lightbulb"></i> تلميح: ${q.hint}</div>` : ''}<div style="display: flex; gap: 0.65rem; align-items: center;"><input class="fill-input" id="fillInput" type="text" placeholder="اكتب إجابتك هنا..." value="${prev}" dir="ltr" autocomplete="off" onkeydown="if(event.key==='Enter') checkFill()" style="flex: 1; background: var(--bg-secondary); border: 2px solid var(--border); border-radius: 0.85rem; padding: 0.85rem 1rem; outline: none;"><button class="fill-check" onclick="checkFill()" style="padding: 0.85rem 1.3rem; border: none; border-radius: 2rem; background: var(--gradient); color: white; font-weight: 700; font-size: 0.85rem; cursor: pointer;">تحقق</button></div></div>`;
            }

            const isLast = currentQIndex === total - 1;
            document.getElementById('quizModalContainer').innerHTML = `
                <div class="modal-topbar"><button class="modal-close-btn" onclick="closeModal()"><i class="fas fa-times"></i></button><div style="display: flex; align-items: center; gap: 0.75rem;"><span style="background: var(--primary); color: white; padding: 0.3rem 0.9rem; border-radius: 2rem; font-size: 0.82rem; font-weight: 700;">${currentQIndex+1}/${total}</span><span class="q-timer" id="qTimer" style="background: var(--bg-card); border: 1px solid var(--border); padding: 0.3rem 0.9rem; border-radius: 2rem; font-size: 0.82rem; font-weight: 600;"><i class="fas fa-hourglass-half"></i> <span id="timeLeftSpan">${currentQuiz.timePerQuestion}</span>s</span></div></div>
                <div style="height: 4px; background: var(--bg-secondary); border-radius: 100px; overflow: hidden; margin-bottom: 1.75rem;"><div style="height: 100%; border-radius: 100px; background: var(--gradient); transition: width 0.4s ease; width: ${pct}%;"></div></div>
                ${domainHTML}${passageHTML}<div class="question-box" style="background: var(--gradient); color: white; padding: 1.5rem; border-radius: 1.1rem; font-size: 1.1rem; font-weight: 600; line-height: 1.65; margin-bottom: 1.5rem;"><span style="font-size: 0.75rem; opacity: 0.75; font-weight: 500; display: block; margin-bottom: 0.5rem;">Question ${currentQIndex+1}</span>${q.question}</div>
                ${bodyHTML}<div id="answerFeedback" style="padding: 0.85rem 1.1rem; border-radius: 0.85rem; font-weight: 600; font-size: 0.92rem; margin-bottom: 1.25rem; display: none; align-items: center; gap: 0.5rem;"></div>
                <div id="explanationBox" style="background: rgba(99,102,241,0.06); border: 1px solid rgba(99,102,241,0.2); border-radius: 0.85rem; padding: 0.85rem 1rem; margin-bottom: 1.25rem; font-size: 0.87rem; color: var(--text-secondary); display: none; align-items: flex-start; gap: 0.5rem;"><i class="fas fa-info-circle" style="color: var(--primary); margin-top: 0.1rem;"></i><span id="explanationText"></span></div>
                <div style="display: flex; justify-content: space-between; align-items: center; gap: 1rem;"><button class="nav-skip" onclick="skipQuestion()" style="background: transparent; color: var(--text-secondary); border: none; font-size: 0.82rem; cursor: pointer; text-decoration: underline;">تخطي</button>${isLast ? `<button class="learn-btn" onclick="submitQuiz()">إنهاء <i class="fas fa-flag-checkered"></i></button>` : `<button class="learn-btn" id="nextBtn" onclick="manualNextQuestion()">التالي <i class="fas fa-chevron-left"></i></button>`}</div>`;
            startTimer();
        }

        function selectMCQ(idx, el) { const list = document.getElementById('optionsList'); if (!list || list.classList.contains('locked')) return; userAnswers[currentQIndex] = idx; revealMCQ(currentQuiz.questions[currentQIndex]); }
        function selectTF(val, el) { const wrap = document.getElementById('tfOptions'); if (!wrap || wrap.classList.contains('locked')) return; userAnswers[currentQIndex] = val; revealTF(currentQuiz.questions[currentQIndex]); }
        function checkFill() { const inp = document.getElementById('fillInput'); if (!inp || inp.disabled) return; const val = inp.value.trim().toLowerCase(), q = currentQuiz.questions[currentQIndex], correct = (q.answer || '').toLowerCase().trim(); userAnswers[currentQIndex] = val; const isRight = val === correct; inp.classList.add(isRight ? 'correct' : 'wrong'); inp.disabled = true; showFeedback(isRight, q.answer); showExplanation(q.explanation); startAutoAdvance(); }

        function showFeedback(isRight, correct) { const fb = document.getElementById('answerFeedback'); if (!fb) return; fb.style.display = 'flex'; if (isRight) { fb.className = 'answer-feedback show right'; fb.innerHTML = `<i class="fas fa-check-circle"></i> ممتاز! إجابة صحيحة ✓`; } else { fb.className = 'answer-feedback show wrong'; fb.innerHTML = `<i class="fas fa-times-circle"></i> الإجابة الصحيحة: <b style="margin-right:0.4rem">${correct}</b>`; } }
        function showExplanation(text) { if (!text) return; const box = document.getElementById('explanationBox'), span = document.getElementById('explanationText'); if (box && span) { span.textContent = text; box.style.display = 'flex'; } }

        function startTimer() { if (timer) clearInterval(timer); timeLeft = currentQuiz.timePerQuestion; timer = setInterval(() => { timeLeft--; const el = document.getElementById('timeLeftSpan'); if (el) el.textContent = timeLeft; if (timeLeft <= 0) { clearInterval(timer); autoAdvance(); } }, 1000); }
        function autoAdvance() { if (currentQIndex < currentQuiz.questions.length - 1) { currentQIndex++; renderQuestion(); } else submitQuiz(); }
        function startAutoAdvance() { if (autoAdvanceTimer) clearTimeout(autoAdvanceTimer); autoAdvanceTimer = setTimeout(() => { if (currentQIndex < currentQuiz.questions.length - 1) { currentQIndex++; renderQuestion(); } else submitQuiz(); }, 3000); }
        function manualNextQuestion() { if (userAnswers[currentQIndex] === undefined) { showToast('اختر إجابة أو اضغط تخطي', 'warn'); return; } currentQIndex++; renderQuestion(); }
        function skipQuestion() { if (currentQIndex < currentQuiz.questions.length - 1) { currentQIndex++; renderQuestion(); } else submitQuiz(); }

        function revealMCQ(q) {
            const list = document.getElementById('optionsList'); if (!list) return; list.classList.add('locked');
            list.querySelectorAll('.option-item').forEach((o, i) => {
                if (i === q.correct) { o.classList.add('correct'); o.querySelector('.option-feedback-icon').style.display = 'block'; }
                else if (userAnswers[currentQIndex] === i) { o.classList.add('wrong'); o.querySelector('.option-feedback-icon').className = 'fas fa-times option-feedback-icon'; o.querySelector('.option-feedback-icon').style.display = 'block'; }
            });
            showFeedback(userAnswers[currentQIndex] === q.correct, q.options[q.correct]); showExplanation(q.explanation); startAutoAdvance();
        }
        function revealTF(q) {
            const wrap = document.getElementById('tfOptions'); if (!wrap) return; wrap.classList.add('locked');
            wrap.querySelectorAll('.tf-option').forEach(b => { const isTrue = b.textContent.includes('True'); if (isTrue === q.correct) b.classList.add('correct'); else if (userAnswers[currentQIndex] === isTrue && isTrue !== q.correct) b.classList.add('wrong'); });
            showFeedback(userAnswers[currentQIndex] === q.correct, q.correct ? 'True ✓' : 'False ✗'); showExplanation(q.explanation); startAutoAdvance();
        }

        function submitQuiz() {
            clearInterval(timer); if (autoAdvanceTimer) clearTimeout(autoAdvanceTimer);
            const total = currentQuiz.questions.length; let correct = 0, wrong = 0, skipped = 0;
            currentQuiz.questions.forEach((q, i) => { const ans = userAnswers[i]; if (ans === undefined) { skipped++; return; } let isRight = false; if (q.type === 'mcq') isRight = ans === q.correct; else if (q.type === 'tf') isRight = ans === q.correct; else if (q.type === 'fill') isRight = ans.toLowerCase().trim() === (q.answer||'').toLowerCase().trim(); if (isRight) correct++; else wrong++; });
            const pct = Math.round((correct / total) * 100);
            if (pct >= 60 && !completedQuizzes.includes(currentQuiz.id)) { completedQuizzes.push(currentQuiz.id); localStorage.setItem('cefr_completed_v2', JSON.stringify(completedQuizzes)); }
            const prev = getScore(currentQuiz.id); if (prev === null || pct > prev) localStorage.setItem(`cefr_score_${currentQuiz.id}`, pct);
            updatePageStats(); displayQuizzes(); showResults(correct, wrong, skipped, pct, total);
        }

        function showResults(correct, wrong, skipped, pct, total) {
            let title, msg; if (pct >= 90) { title = t('excellent'); msg = 'أداء استثنائي — أنت في القمة!'; } else if (pct >= 75) { title = t('veryGood'); msg = 'نتيجة قوية، واصل التحسن!'; } else if (pct >= 60) { title = t('passed'); msg = 'لقد فتحت المستوى التالي!'; } else { title = t('needsReview'); msg = `حصلت على ${pct}% — تحتاج 60% لفتح المستوى التالي.`; }
            const nextQuiz = QUIZZES.find(q => q.id === currentQuiz.id + 1), unlockedNext = pct >= 60 && nextQuiz;
            document.getElementById('quizModalContainer').innerHTML = `
                <div class="modal-topbar" style="border:none"><button class="modal-close-btn" onclick="closeModal()"><i class="fas fa-times"></i></button><span style="font-weight:700;color:var(--text-secondary);font-size:0.9rem">${currentQuiz.title}</span></div>
                <div class="results-wrap" style="text-align: center;"><div class="result-circle" style="width: 140px; height: 140px; border-radius: 50%; background: var(--gradient); display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 0 auto 1.5rem; color: white;"><span style="font-size: 2.8rem; font-weight: 800;">${pct}</span><span style="font-size: 1.1rem; opacity: 0.85;">%</span></div><h2 style="font-size: 1.6rem; font-weight: 800; margin-bottom: 0.4rem;">${title}</h2><p style="color: var(--text-secondary); font-size: 0.95rem; margin-bottom: 1.75rem;">${msg}</p>
                    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.85rem; margin-bottom: 2rem;"><div style="background: var(--bg-secondary); padding: 1rem 0.75rem; border-radius: 1rem;"><span style="font-size: 1.6rem; font-weight: 800; color: var(--success); display: block;">${correct}</span><span style="font-size: 0.78rem; color: var(--text-secondary);">صحيح</span></div><div style="background: var(--bg-secondary); padding: 1rem 0.75rem; border-radius: 1rem;"><span style="font-size: 1.6rem; font-weight: 800; color: var(--danger); display: block;">${wrong}</span><span style="font-size: 0.78rem; color: var(--text-secondary);">خطأ</span></div><div style="background: var(--bg-secondary); padding: 1rem 0.75rem; border-radius: 1rem;"><span style="font-size: 1.6rem; font-weight: 800; color: var(--text-secondary); display: block;">${skipped}</span><span style="font-size: 0.78rem; color: var(--text-secondary);">تخطى</span></div></div>
                    <div style="display: flex; justify-content: center; gap: 0.85rem; flex-wrap: wrap;"><button class="learn-btn" onclick="startQuiz(${currentQuiz.id})"><i class="fas fa-redo"></i> أعد الاختبار</button><button class="learn-btn" onclick="showReview()" style="background:var(--bg-secondary); color:var(--text-primary);"><i class="fas fa-list-check"></i> مراجعة الإجابات</button></div>
                </div>`;
        }

        function showReview() {
            let html = `<div class="modal-topbar"><button class="modal-close-btn" onclick="closeModal()"><i class="fas fa-times"></i></button><span style="font-weight:700;font-size:0.9rem;color:var(--text-secondary)">${t('reviewAnswers')}</span></div>`;
            currentQuiz.questions.forEach((q, i) => {
                const ans = userAnswers[i], skipped = ans === undefined; let isRight = false; if (!skipped) { if (q.type === 'mcq') isRight = ans === q.correct; else if (q.type === 'tf') isRight = ans === q.correct; else isRight = ans.toLowerCase().trim() === (q.answer||'').toLowerCase().trim(); }
                const correctAns = q.type==='mcq' ? q.options[q.correct] : q.type==='tf' ? (q.correct ? 'True' : 'False') : q.answer;
                const yourAns = q.type==='mcq' ? (ans!==undefined ? q.options[ans] : '—') : q.type==='tf' ? (ans===true ? 'True' : ans===false ? 'False' : '—') : (ans || '—');
                html += `<div style="background: var(--bg-card); border-radius: 1.1rem; padding: 1.25rem; margin-bottom: 1rem; border: 2px solid var(--border);"><div style="font-weight: 600; font-size: 0.95rem; margin-bottom: 0.85rem;">${i+1}. ${q.question}</div><div style="display: flex; flex-direction: column; gap: 0.4rem;">${!isRight && !skipped ? `<div style="padding: 0.55rem 0.85rem; border-radius: 0.65rem; background: rgba(239,68,68,0.09); color: #b91c1c; font-size: 0.85rem;">إجابتك: ${yourAns}</div>` : ''}<div style="padding: 0.55rem 0.85rem; border-radius: 0.65rem; background: rgba(34,197,94,0.1); color: #15803d; font-size: 0.85rem;">الإجابة الصحيحة: ${correctAns}</div>${q.explanation ? `<div style="font-size:0.8rem;color:var(--text-secondary);padding:0.4rem 0.6rem;background:var(--bg-secondary);border-radius:0.5rem;margin-top:0.25rem;"><i class="fas fa-info-circle" style="color:var(--primary);margin-left:0.3rem"></i>${q.explanation}</div>` : ''}</div></div>`;
            });
            html += `<div style="text-align:center;margin-top:1.5rem"><button class="learn-btn" onclick="startQuiz(${currentQuiz.id})" style="margin: 0 auto;"><i class="fas fa-redo"></i> أعد الاختبار</button></div>`;
            document.getElementById('quizModalContainer').innerHTML = html;
        }

        function showToast(msg, type = 'info') { const tc = document.getElementById('toastContainer'); const t = document.createElement('div'); t.className = `toast ${type}`; t.innerHTML = `<i class="fas fa-${type==='warn'?'exclamation-circle':'info-circle'}"></i> ${msg}`; tc.appendChild(t); setTimeout(() => { t.style.animation = 'toastOut 0.3s ease forwards'; setTimeout(() => t.remove(), 300); }, 2200); }
    </script>
</body>
</html>
