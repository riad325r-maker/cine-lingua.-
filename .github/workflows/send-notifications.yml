name: Send Scheduled Notifications

on:
  schedule:
    - cron: '0 6 * * *'    # 8 صباح مصر  (UTC+2)
    - cron: '0 11 * * *'   # 1 ظهر مصر
    - cron: '0 15 * * *'   # 5 مساء مصر
    - cron: '0 19 * * *'   # 9 مساء مصر
    - cron: '0 23 * * *'   # 1 صباح مصر
  workflow_dispatch:        # تشغيل يدوي للاختبار فقط

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install firebase-admin

      - name: Send notification
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node .github/scripts/send-notification.js
