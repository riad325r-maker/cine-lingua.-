ت غييرname: Send Scheduled Notifications

on:
  schedule:
    - cron: '0 6 * * *'   # 6 صباحاً UTC = 9 صباحاً السعودية
    - cron: '0 11 * * *'  # 11 ظهراً UTC = 2 ظهراً السعودية
    - cron: '0 16 * * *'  # 4 مساءً UTC = 7 مساءً السعودية
    - cron: '0 19 * * *'  # 7 مساءً UTC = 10 مساءً السعودية
  workflow_dispatch: # تشغيل يدوي من GitHub

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install firebase-admin node-fetch

      - name: Send notification
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node .github/scripts/send-notification.js
