<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineLingua | تحديد المستوى</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .navbar { display: none; }
        .test-container { max-width: 800px; width: 100%; }
        .test-card {
            background: white; border-radius: 2rem; padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); animation: fadeIn 0.5s ease;
        }
        [data-theme="dark"] .test-card { background: #1e293b; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .test-header { text-align: center; margin-bottom: 2rem; }
        .test-header i { font-size: 4rem; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .test-header h1 { font-size: 2.5rem; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .test-header p { color: #64748b; }
        [data-theme="dark"] .test-header p { color: #94a3b8; }
        .progress-steps { display: flex; align-items: center; justify-content: center; margin-bottom: 3rem; }
        .step { display: flex; flex-direction: column; align-items: center; }
        .step-number {
            width: 40px; height: 40px; border-radius: 50%;
            background: #e2e8f0; border: 3px solid #cbd5e1;
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; color: #64748b; margin-bottom: 0.5rem;
        }
        .step.active .step-number { background: linear-gradient(135deg, #667eea, #764ba2); border-color: transparent; color: white; }
        .step.completed .step-number { background: #10b981; border-color: #10b981; color: white; }
        .step-line { width: 100px; height: 3px; background: #e2e8f0; margin: 0 1rem; }
        .step-line.active { background: linear-gradient(135deg, #667eea, #764ba2); }
        .test-section { display: none; animation: slideIn 0.5s ease; }
        .test-section.active { display: block; }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .section-title { font-size: 1.5rem; margin-bottom: 2rem; color: #0f172a; text-align: center; }
        [data-theme="dark"] .section-title { color: #f1f5f9; }
        .options-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
        .option-card { position: relative; cursor: pointer; }
        .option-card input { position: absolute; opacity: 0; }
        .option-content {
            padding: 2rem; border: 3px solid #e2e8f0; border-radius: 1rem;
            background: white; text-align: center; transition: all 0.3s;
        }
        [data-theme="dark"] .option-content { background: #334155; border-color: #475569; }
        .option-card:hover .option-content { border-color: #667eea; transform: translateY(-5px); box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); }
        .option-card input:checked + .option-content { border-color: #667eea; background: linear-gradient(135deg, rgba(102,126,234,0.1), rgba(118,75,162,0.1)); }
        .option-content i { font-size: 3rem; color: #667eea; margin-bottom: 1rem; }
        .tenses-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem; }
        .tense-card { position: relative; cursor: pointer; }
        .tense-card input { position: absolute; opacity: 0; }
        .tense-content {
            padding: 1rem; border: 2px solid #e2e8f0; border-radius: 0.5rem;
            background: white; text-align: center; transition: all 0.3s;
        }
        [data-theme="dark"] .tense-content { background: #334155; border-color: #475569; }
        .tense-card:hover .tense-content { border-color: #667eea; }
        .tense-card input:checked + .tense-content { border-color: #667eea; background: linear-gradient(135deg, rgba(102,126,234,0.1), rgba(118,75,162,0.1)); }
        .btn-group { display: flex; gap: 1rem; justify-content: space-between; margin-top: 2rem; }
        .btn-primary, .btn-secondary {
            padding: 1rem 2rem; border: none; border-radius: 0.5rem;
            font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.3s;
            display: flex; align-items: center; gap: 0.5rem;
        }
        .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .btn-primary:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 10px 25px -5px rgba(102,126,234,0.5); }
        .btn-secondary { background: #e2e8f0; color: #0f172a; }
        [data-theme="dark"] .btn-secondary { background: #334155; color: #f1f5f9; }
        .result-box { text-align: center; padding: 2rem; background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 1rem; color: white; }
        .result-level { font-size: 3rem; font-weight: 800; margin: 1rem 0; }
        .result-details { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin: 2rem 0; }
        .result-stat { background: rgba(255,255,255,0.2); padding: 1rem; border-radius: 0.5rem; }
        .result-stat .number { font-size: 2rem; font-weight: 700; }
        .recommendations { list-style: none; margin: 2rem 0; }
        .recommendations li { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem; background: rgba(255,255,255,0.1); border-radius: 0.5rem; margin-bottom: 0.5rem; }
        .loading-spinner {
            display: inline-block; width: 20px; height: 20px;
            border: 3px solid rgba(255,255,255,.3); border-radius: 50%;
            border-top-color: #fff; animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="test-container">
        <div class="test-card">
            <div class="test-header">
                <i class="fas fa-graduation-cap"></i>
                <h1>تحديد المستوى</h1>
                <p>أجب على هذه الأسئلة لتحديد مستواك بالضبط</p>
            </div>
            <div class="progress-steps">
                <div class="step active" id="step1"><div class="step-number">1</div><span class="step-label">المفردات</span></div>
                <div class="step-line" id="stepLine1"></div>
                <div class="step" id="step2"><div class="step-number">2</div><span class="step-label">القواعد</span></div>
                <div class="step-line" id="stepLine2"></div>
                <div class="step" id="step3"><div class="step-number">3</div><span class="step-label">النتيجة</span></div>
            </div>

            <div class="test-section active" id="section1">
                <h3 class="section-title">كم كلمة تقريباً تعرف؟</h3>
                <div class="options-grid">
                    <label class="option-card"><input type="radio" name="vocab" value="beginner"><div class="option-content"><i class="fas fa-seedling"></i><h3>أقل من 500</h3><p>مستوى مبتدئ</p></div></label>
                    <label class="option-card"><input type="radio" name="vocab" value="intermediate"><div class="option-content"><i class="fas fa-tree"></i><h3>500 - 1500</h3><p>مستوى متوسط</p></div></label>
                    <label class="option-card"><input type="radio" name="vocab" value="advanced"><div class="option-content"><i class="fas fa-crown"></i><h3>أكثر من 1500</h3><p>مستوى متقدم</p></div></label>
                </div>
                <div class="btn-group"><button class="btn-primary" onclick="nextSection()">التالي <i class="fas fa-arrow-left"></i></button></div>
            </div>

            <div class="test-section" id="section2">
                <h3 class="section-title">اختر الأزمنة التي تعرفها</h3>
                <div class="tenses-grid" id="tensesGrid"></div>
                <div class="btn-group">
                    <button class="btn-secondary" onclick="prevSection()"><i class="fas fa-arrow-right"></i> السابق</button>
                    <button class="btn-primary" onclick="calculateLevel()">عرض نتيجتي <i class="fas fa-chart-line"></i></button>
                </div>
            </div>

            <div class="test-section" id="section3">
                <div class="result-box">
                    <h2>مستواك هو:</h2>
                    <div class="result-level" id="resultLevel">-</div>
                    <div class="result-details">
                        <div class="result-stat"><div class="number" id="resultVocab">0</div><div>المفردات</div></div>
                        <div class="result-stat"><div class="number" id="resultTenses">0</div><div>الأزمنة</div></div>
                        <div class="result-stat"><div class="number" id="resultScore">0%</div><div>التقييم</div></div>
                    </div>
                    <ul class="recommendations" id="recommendations"></ul>
                    <button class="btn-primary" onclick="saveLevel()" id="saveBtn">حفظ وبدء التعلم</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { auth, db } from './assets/js/firebase-config.js';
        import { doc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const tenses = [
            { value: 'present-simple', name: 'Present Simple', ar: 'المضارع البسيط' },
            { value: 'present-continuous', name: 'Present Continuous', ar: 'المضارع المستمر' },
            { value: 'past-simple', name: 'Past Simple', ar: 'الماضي البسيط' },
            { value: 'past-continuous', name: 'Past Continuous', ar: 'الماضي المستمر' },
            { value: 'present-perfect', name: 'Present Perfect', ar: 'المضارع التام' },
            { value: 'future', name: 'Future', ar: 'المستقبل' }
        ];

        document.getElementById('tensesGrid').innerHTML = tenses.map(t => `
            <label class="tense-card">
                <input type="checkbox" name="tense" value="${t.value}">
                <div class="tense-content"><span>${t.name}</span><small>${t.ar}</small></div>
            </label>
        `).join('');

        let userData = { vocab: '', tenses: [] };
        let currentUser = null;

        onAuthStateChanged(auth, (user) => { if (!user) window.location.href = 'index.html'; else currentUser = user; });

        window.nextSection = function() {
            const vocab = document.querySelector('input[name="vocab"]:checked')?.value;
            if (!vocab) return alert('الرجاء اختيار مستوى المفردات');
            userData.vocab = vocab;
            document.getElementById('step1').classList.replace('active', 'completed');
            document.getElementById('stepLine1').classList.add('active');
            document.getElementById('step2').classList.add('active');
            document.getElementById('section1').classList.remove('active');
            document.getElementById('section2').classList.add('active');
        };

        window.prevSection = function() {
            document.getElementById('step2').classList.remove('active');
            document.getElementById('step1').classList.replace('completed', 'active');
            document.getElementById('stepLine1').classList.remove('active');
            document.getElementById('section2').classList.remove('active');
            document.getElementById('section1').classList.add('active');
        };

        window.calculateLevel = function() {
            const tenses = Array.from(document.querySelectorAll('input[name="tense"]:checked')).map(cb => cb.value);
            if (tenses.length === 0) return alert('الرجاء اختيار الأزمنة التي تعرفها');
            userData.tenses = tenses;

            let score = userData.vocab === 'beginner' ? 20 : userData.vocab === 'intermediate' ? 40 : 60;
            score += tenses.length * 5;
            let level = score < 40 ? 'مبتدئ' : score < 70 ? 'متوسط' : 'متقدم';
            let recommendations = score < 40 ? ['ابدأ بتعلم الكلمات الأساسية', 'ركز على الأفعال الشائعة', 'تدرب على Present Simple'] :
                                 score < 70 ? ['تعلم 10 كلمات جديدة يومياً', 'ركز على Past Continuous', 'اقرأ القصص القصيرة'] :
                                 ['تعلم Phrasal Verbs', 'ركز على الأزمنة المعقدة', 'اقرأ مقالات طويلة'];

            document.getElementById('resultLevel').textContent = level;
            document.getElementById('resultVocab').textContent = userData.vocab === 'beginner' ? 'مبتدئ' : userData.vocab === 'intermediate' ? 'متوسط' : 'متقدم';
            document.getElementById('resultTenses').textContent = tenses.length;
            document.getElementById('resultScore').textContent = Math.round(score) + '%';
            document.getElementById('recommendations').innerHTML = recommendations.map(r => `<li><i class="fas fa-check-circle"></i>${r}</li>`).join('');

            userData.level = level;
            userData.score = score;

            document.getElementById('step2').classList.replace('active', 'completed');
            document.getElementById('stepLine2').classList.add('active');
            document.getElementById('step3').classList.add('active');
            document.getElementById('section2').classList.remove('active');
            document.getElementById('section3').classList.add('active');
        };

        window.saveLevel = async function() {
            if (!currentUser) return;
            const btn = document.getElementById('saveBtn');
            btn.innerHTML = 'جاري الحفظ... <span class="loading-spinner"></span>'; btn.disabled = true;

            await updateDoc(doc(db, "users", currentUser.uid), {
                level: userData.level,
                currentLevel: userData.vocab,
                wordsLevel: userData.vocab,
                tenses: userData.tenses,
                score: userData.score,
                needsLevelTest: false
            });
            window.location.href = 'dashboard.html';
        };
    </script>
</body>
</html>
