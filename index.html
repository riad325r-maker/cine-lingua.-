<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineLingua | تعلم الإنجليزية بذكاء</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .navbar { display: none; }
        .register-section {
            max-width: 500px;
            width: 100%;
            background: white;
            border-radius: 2rem;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        [data-theme="dark"] .register-section { background: #1e293b; }
        .register-header { text-align: center; margin-bottom: 2rem; }
        .register-header i { font-size: 4rem; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .register-header h2 { font-size: 2rem; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.5rem; }
        .register-header p { color: #64748b; }
        [data-theme="dark"] .register-header p { color: #94a3b8; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 600; color: #0f172a; }
        [data-theme="dark"] .form-group label { color: #f1f5f9; }
        .form-group input {
            width: 100%; padding: 0.75rem 1rem;
            border: 2px solid #e2e8f0; border-radius: 0.75rem;
            background: white; font-size: 1rem; transition: all 0.3s;
        }
        [data-theme="dark"] .form-group input {
            background: #334155; border-color: #475569; color: white;
        }
        .form-group input:focus {
            outline: none; border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .password-wrapper { position: relative; }
        .password-wrapper input { padding-left: 3rem !important; }
        .password-toggle {
            position: absolute; left: 1rem; top: 50%;
            transform: translateY(-50%); cursor: pointer;
            color: #64748b; z-index: 2;
        }
        .btn-register {
            width: 100%; padding: 1rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white; border: none; border-radius: 0.75rem;
            font-size: 1.1rem; font-weight: 600; cursor: pointer;
            transition: all 0.3s; display: flex; align-items: center;
            justify-content: center; gap: 0.5rem; margin: 1.5rem 0;
        }
        .btn-register:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 10px 25px -5px rgba(102, 126, 234, 0.5); }
        .btn-register:disabled { opacity: 0.7; cursor: not-allowed; }
        .google-section { text-align: center; margin-top: 1.5rem; }
        .btn-google {
            width: 100%; padding: 1rem;
            background: white; border: 2px solid #e2e8f0;
            border-radius: 0.75rem; font-size: 1rem; font-weight: 600;
            cursor: pointer; transition: all 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 0.75rem;
            color: #0f172a;
        }
        [data-theme="dark"] .btn-google { background: #334155; border-color: #475569; color: white; }
        .btn-google:hover { border-color: #667eea; transform: translateY(-2px); }
        .btn-google i { color: #DB4437; }
        .divider { text-align: center; position: relative; margin: 1.5rem 0; }
        .divider::before, .divider::after {
            content: ''; position: absolute; top: 50%;
            width: 45%; height: 1px; background-color: #e2e8f0;
        }
        .divider::before { right: 0; }
        .divider::after { left: 0; }
        .divider span { background: white; padding: 0 1rem; color: #64748b; }
        [data-theme="dark"] .divider span { background: #1e293b; color: #94a3b8; }
        .login-link { text-align: center; margin-top: 1.5rem; }
        .login-link a { color: #667eea; font-weight: 600; text-decoration: none; }
        .alert {
            position: fixed; top: 20px; left: 50%;
            transform: translateX(-50%); padding: 1rem 2rem;
            border-radius: 0.5rem; background: white; border: 2px solid;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3); z-index: 9999;
            animation: slideDown 0.3s ease;
        }
        .alert.success { border-color: #10b981; color: #10b981; }
        .alert.error { border-color: #ef4444; color: #ef4444; }
        .alert.info { border-color: #3b82f6; color: #3b82f6; }
        @keyframes slideDown {
            from { opacity: 0; transform: translate(-50%, -20px); }
            to { opacity: 1; transform: translate(-50%, 0); }
        }
        .loading-spinner {
            display: inline-block; width: 20px; height: 20px;
            border: 3px solid rgba(255,255,255,.3); border-radius: 50%;
            border-top-color: #fff; animation: spin 1s ease-in-out infinite;
            margin-left: 0.5rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <section class="register-section">
        <div class="register-header">
            <i class="fas fa-film"></i>
            <h2>أنشئ حسابك المجاني</h2>
            <p>ابدأ رحلتك في تعلم الإنجليزية الآن</p>
        </div>

        <form class="register-form" id="registerForm">
            <div class="form-row">
                <div class="form-group">
                    <label>الاسم الأول</label>
                    <input type="text" id="firstName" placeholder="أحمد" required>
                </div>
                <div class="form-group">
                    <label>اسم العائلة</label>
                    <input type="text" id="lastName" placeholder="محمد" required>
                </div>
            </div>
            <div class="form-group">
                <label>البريد الإلكتروني</label>
                <input type="email" id="email" placeholder="ahmed@example.com" required>
            </div>
            <div class="form-group">
                <label>كلمة المرور</label>
                <div class="password-wrapper">
                    <input type="password" id="password" placeholder="********" required>
                    <i class="fas fa-eye password-toggle" onclick="togglePassword()" id="togglePassword"></i>
                </div>
                <small style="color: #64748b;">يجب أن تكون 6 أحرف على الأقل</small>
            </div>
            <button type="submit" class="btn-register" id="registerBtn">
                <i class="fas fa-user-plus"></i> إنشاء حساب جديد
            </button>
            <div class="divider"><span>أو</span></div>
            <div class="google-section">
                <button type="button" class="btn-google" onclick="handleGoogleRegister()" id="googleBtn">
                    <i class="fab fa-google"></i> متابعة بحساب Google
                </button>
            </div>
            <div class="login-link">
                <span>لديك حساب بالفعل؟ </span>
                <a href="#" onclick="showLoginForm()">تسجيل دخول</a>
            </div>
        </form>

        <form class="register-form" id="loginForm" style="display: none;">
            <div class="form-group">
                <label>البريد الإلكتروني</label>
                <input type="email" id="loginEmail" placeholder="أدخل بريدك" required>
            </div>
            <div class="form-group">
                <label>كلمة المرور</label>
                <div class="password-wrapper">
                    <input type="password" id="loginPassword" placeholder="********" required>
                </div>
                <a href="#" style="display:block; text-align:left; margin-top:0.5rem; color:#667eea;" onclick="forgotPassword()">نسيت كلمة المرور؟</a>
            </div>
            <button type="submit" class="btn-register" id="loginBtn">
                <i class="fas fa-sign-in-alt"></i> تسجيل الدخول
            </button>
            <div class="divider"><span>أو</span></div>
            <div class="google-section">
                <button type="button" class="btn-google" onclick="handleGoogleLogin()">
                    <i class="fab fa-google"></i> تسجيل الدخول بـ Google
                </button>
            </div>
            <div class="login-link">
                <span>ليس لديك حساب؟ </span>
                <a href="#" onclick="showRegisterForm()">إنشاء حساب جديد</a>
            </div>
        </form>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBnZGheBuw2S-dJUZ6f1jsx9e2ODv-gkX4",
            authDomain: "project-9ca8a.firebaseapp.com",
            projectId: "project-9ca8a",
            storageBucket: "project-9ca8a.firebasestorage.app",
            messagingSenderId: "1001751197267",
            appId: "1:1001751197267:web:d6c56c243d0f3d678f38a6"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists()) {
                    const userData = userDoc.data();
                    window.location.href = userData.needsLevelTest ? 'level-test.html' : 'dashboard.html';
                }
            }
        });

        window.togglePassword = function() {
            const input = document.getElementById('password');
            const icon = document.getElementById('togglePassword');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        };

        window.showRegisterForm = (e) => { e?.preventDefault(); document.getElementById('loginForm').style.display = 'none'; document.getElementById('registerForm').style.display = 'block'; };
        window.showLoginForm = (e) => { e?.preventDefault(); document.getElementById('registerForm').style.display = 'none'; document.getElementById('loginForm').style.display = 'block'; };

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('registerBtn');
            const firstName = document.getElementById('firstName').value;
            const lastName = document.getElementById('lastName').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (!firstName || !lastName || !email || !password) return showNotification('الرجاء ملء جميع الحقول', 'error');
            if (password.length < 6) return showNotification('كلمة المرور يجب أن تكون 6 أحرف على الأقل', 'error');

            btn.innerHTML = 'جاري إنشاء الحساب... <span class="loading-spinner"></span>'; btn.disabled = true;

            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                await setDoc(doc(db, "users", userCredential.user.uid), {
                    firstName, lastName, email, level: 'pending', needsLevelTest: true,
                    savedWords: [], readStories: [], quizResults: [], createdAt: new Date().toISOString()
                });
                showNotification('تم إنشاء الحساب بنجاح!', 'success');
            } catch (error) {
                btn.innerHTML = '<i class="fas fa-user-plus"></i> إنشاء حساب جديد'; btn.disabled = false;
                let msg = 'خطأ في إنشاء الحساب';
                if (error.code === 'auth/email-already-in-use') msg = 'البريد الإلكتروني مستخدم بالفعل';
                else if (error.code === 'auth/weak-password') msg = 'كلمة المرور ضعيفة جداً';
                showNotification(msg, 'error');
            }
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            if (!email || !password) return showNotification('الرجاء إدخال البريد الإلكتروني وكلمة المرور', 'error');

            btn.innerHTML = 'جاري تسجيل الدخول... <span class="loading-spinner"></span>'; btn.disabled = true;

            try {
                await signInWithEmailAndPassword(auth, email, password);
                showNotification('تم تسجيل الدخول بنجاح!', 'success');
            } catch (error) {
                btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> تسجيل الدخول'; btn.disabled = false;
                let msg = 'خطأ في تسجيل الدخول';
                if (error.code === 'auth/user-not-found') msg = 'المستخدم غير موجود';
                else if (error.code === 'auth/wrong-password') msg = 'كلمة المرور غير صحيحة';
                showNotification(msg, 'error');
            }
        });

        window.handleGoogleLogin = () => showNotification('سيتم تفعيل Google قريباً', 'info');
        window.handleGoogleRegister = () => showNotification('سيتم تفعيل Google قريباً', 'info');
        window.forgotPassword = (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail')?.value;
            showNotification(email ? `تم إرسال رابط إعادة التعيين إلى ${email}` : 'الرجاء إدخال بريدك الإلكتروني أولاً', 'info');
        };

        function showNotification(message, type) {
            document.querySelector('.alert')?.remove();
            const alert = document.createElement('div');
            alert.className = `alert ${type}`;
            alert.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle'}"></i><span>${message}</span>`;
            document.body.appendChild(alert);
            setTimeout(() => alert.remove(), 3000);
        }
    </script>
</body>
</html>
