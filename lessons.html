<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="page-title">CineLingua | الكلمات والجمل</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <!-- PAGE HEADER -->
        <div class="page-header">
            <h1 id="page-title" data-i18n="page-title">تعلم الكلمات والجمل</h1>
            <div class="header-actions">
                <div class="quick-stats">
                    <div class="quick-stat">
                        <i class="fas fa-book"></i>
                        <span><span class="qs-val" id="totalWords">0</span> <span id="lbl-total" data-i18n="lbl-total">كلمة</span></span>
                    </div>
                    <div class="quick-stat">
                        <i class="fas fa-check-circle"></i>
                        <span><span class="qs-val" id="learnedCount">0</span> <span id="lbl-learned" data-i18n="lbl-learned">مكتملة</span></span>
                    </div>
                    <div class="quick-stat">
                        <i class="fas fa-bookmark"></i>
                        <span><span class="qs-val" id="savedCount">0</span> <span id="lbl-saved" data-i18n="lbl-saved">محفوظة</span></span>
                    </div>
                </div>
                <div class="streak-badge">
                    <i class="fas fa-fire"></i> <span id="streakNum">0</span> <span id="lbl-streak" data-i18n="lbl-streak">يوم</span>
                </div>
                <button class="stats-toggle-btn" onclick="toggleStats()">
                    <i class="fas fa-chart-bar"></i> <span id="lbl-mystats" data-i18n="lbl-mystats">إحصائياتي</span>
                </button>
            </div>
        </div>

        <!-- STATS PANEL -->
        <div id="statsPanel" style="display:none">
            <div class="stats-panel glass" style="background: var(--gradient); border-radius: 1.5rem; padding: 1.5rem; margin-bottom: 1.5rem; color: white;">
                <div class="stats-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem;">
                    <h3><i class="fas fa-chart-line"></i> <span id="sp-title" data-i18n="sp-title">لوحة التقدم</span></h3>
                    <button class="stats-close" onclick="toggleStats()" style="background: rgba(255,255,255,0.2); border: none; color: white; width: 30px; height: 30px; border-radius: 50%; cursor: pointer;">✕</button>
                </div>
                <div class="stats-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 0.9rem; margin-bottom: 1.25rem;">
                    <div class="stat-box" style="background: rgba(255,255,255,0.15); border-radius: 1rem; padding: 0.9rem; text-align: center;"><span class="s-icon"><i class="fas fa-graduation-cap"></i></span><span class="s-value" id="sp-learned" style="font-size: 1.7rem; font-weight: 800; display: block;">0</span><span class="s-label" id="sp-learned-lbl" data-i18n="sp-learned-lbl">كلمة تعلمتها</span></div>
                    <div class="stat-box" style="background: rgba(255,255,255,0.15); border-radius: 1rem; padding: 0.9rem; text-align: center;"><span class="s-icon"><i class="fas fa-fire"></i></span><span class="s-value" id="sp-streak" style="font-size: 1.7rem; font-weight: 800; display: block;">0</span><span class="s-label" id="sp-streak-lbl" data-i18n="sp-streak-lbl">أيام متتالية</span></div>
                    <div class="stat-box" style="background: rgba(255,255,255,0.15); border-radius: 1rem; padding: 0.9rem; text-align: center;"><span class="s-icon"><i class="fas fa-calendar-day"></i></span><span class="s-value" id="sp-today" style="font-size: 1.7rem; font-weight: 800; display: block;">0</span><span class="s-label" id="sp-today-lbl" data-i18n="sp-today-lbl">تعلمت اليوم</span></div>
                    <div class="stat-box" style="background: rgba(255,255,255,0.15); border-radius: 1rem; padding: 0.9rem; text-align: center;"><span class="s-icon"><i class="fas fa-bookmark"></i></span><span class="s-value" id="sp-saved" style="font-size: 1.7rem; font-weight: 800; display: block;">0</span><span class="s-label" id="sp-saved-lbl" data-i18n="sp-saved-lbl">كلمة محفوظة</span></div>
                    <div class="stat-box" style="background: rgba(255,255,255,0.15); border-radius: 1rem; padding: 0.9rem; text-align: center;"><span class="s-icon"><i class="fas fa-percent"></i></span><span class="s-value" id="sp-pct" style="font-size: 1.7rem; font-weight: 800; display: block;">0%</span><span class="s-label" id="sp-pct-lbl" data-i18n="sp-pct-lbl">نسبة الإتمام</span></div>
                    <div class="stat-box" style="background: rgba(255,255,255,0.15); border-radius: 1rem; padding: 0.9rem; text-align: center;"><span class="s-icon"><i class="fas fa-trophy"></i></span><span class="s-value" id="sp-rank" style="font-size:1.1rem; font-weight: 800; display: block;">—</span><span class="s-label" id="sp-rank-lbl" data-i18n="sp-rank-lbl">مستواك</span></div>
                </div>
                <div class="level-progress" id="levelProgress" style="display: flex; flex-direction: column; gap: 0.55rem;"></div>
            </div>
        </div>

        <!-- DAILY WORD BANNER -->
        <div class="daily-word-banner" id="dailyBanner">
            <span class="daily-tag" id="daily-tag" data-i18n="daily-tag">كلمة اليوم</span>
            <span class="daily-word-text" id="dailyWordText">—</span>
            <span class="daily-word-ar"   id="dailyWordAr"></span>
            <button class="daily-word-btn" onclick="playDailyWord()">
                <i class="fas fa-volume-up"></i> <span id="btn-listen" data-i18n="btn-listen">استمع</span>
            </button>
            <button class="daily-word-btn" onclick="learnDailyWord()">
                <i class="fas fa-check"></i> <span id="btn-learned-it" data-i18n="btn-learned-it">تعلمتها</span>
            </button>
        </div>

        <!-- SEARCH -->
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" data-i18n-placeholder="searchPlaceholder" placeholder="ابحث عن كلمة...">
        </div>

        <!-- FILTERS -->
        <div class="filters-container">
            <div class="filter-row">
                <div class="filter-group">
                    <span class="filter-label" id="lbl-level" data-i18n="lbl-level">المستوى:</span>
                    <div class="filter-tabs" id="levelFilters">
                        <button class="filter-tab active" onclick="filterByLevel('all')"   id="ft-all" data-i18n="ft-all">الكل</button>
                        <button class="filter-tab"        onclick="filterByLevel('beginner')"      id="ft-beg" data-i18n="ft-beg">مبتدئ</button>
                        <button class="filter-tab"        onclick="filterByLevel('intermediate')"  id="ft-int" data-i18n="ft-int">متوسط</button>
                        <button class="filter-tab"        onclick="filterByLevel('advanced')"      id="ft-adv" data-i18n="ft-adv">متقدم</button>
                    </div>
                </div>
                <div class="action-btns-row">
                    <button class="saved-btn" onclick="showSavedWords()">
                        <i class="fas fa-bookmark"></i> <span id="btn-saved" data-i18n="btn-saved">المحفوظات</span>
                        <span class="saved-badge" id="savedBadge">0</span>
                    </button>
                    <button class="saved-btn green" onclick="showLearnedWords()">
                        <i class="fas fa-check-circle"></i> <span id="btn-completed" data-i18n="btn-completed">المكتملة</span>
                        <span class="saved-badge" id="learnedBadge">0</span>
                    </button>
                </div>
            </div>
            <div class="filter-group category-group">
                <span class="filter-label" id="lbl-cat" data-i18n="lbl-cat">التصنيف:</span>
                <div class="filter-tabs category-tabs" id="categoryFilters"></div>
            </div>
        </div>

        <!-- WORDS GRID -->
        <div class="words-grid" id="wordsGrid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 1.2rem;"></div>

        <!-- PAGINATION -->
        <div class="pagination-container" id="paginationContainer">
            <div class="pagination-controls">
                <button class="page-btn" onclick="changePage('prev')" id="prevBtn" disabled>
                    <i class="fas fa-chevron-right"></i> <span id="btn-prev" data-i18n="btn-prev">السابق</span>
                </button>
                <div class="page-numbers" id="pageNumbers"></div>
                <button class="page-btn" onclick="changePage('next')" id="nextBtn">
                    <span id="btn-next" data-i18n="btn-next">التالي</span> <i class="fas fa-chevron-left"></i>
                </button>
            </div>
            <div class="page-info" id="pageInfo"></div>
        </div>
    </div>

    <!-- TOAST -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- SCROLL TOP -->
    <button class="scroll-top" id="scrollTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">
        <i class="fas fa-arrow-up"></i>
    </button>

    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-messaging-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
    <script src="beginner-data.js"></script>
    <script src="intermediate-data.js"></script>
    <script src="advanced-data.js"></script>
    <script src="translation.js"></script>
    <script src="core.js"></script>

    <script>
        const WORDS_DATA = {
            beginner:     typeof BEGINNER_WORDS     !== 'undefined' ? BEGINNER_WORDS     : [],
            intermediate: typeof INTERMEDIATE_WORDS !== 'undefined' ? INTERMEDIATE_WORDS : [],
            advanced:     typeof ADVANCED_WORDS     !== 'undefined' ? ADVANCED_WORDS     : []
        };

        let savedWords   = JSON.parse(localStorage.getItem('savedWords'))   || [];
        let learnedWords = JSON.parse(localStorage.getItem('learnedWords')) || [];
        let todayLearned = JSON.parse(localStorage.getItem('todayLearned')) || { date: '', count: 0 };
        let streak       = JSON.parse(localStorage.getItem('streak'))       || { count: 0, lastDate: '' };

        let currentLevel       = 'all';
        let currentCategory    = 'all';
        let currentSearchQuery = '';
        let viewingSaved       = false;
        let viewingLearned     = false;
        let selectedVoice      = null;
        let currentPage        = 1;
        const itemsPerPage     = 50;
        let totalPages         = 1;
        let currentDisplayWords = [];
        let dailyWord          = null;

        function loadVoices() {
            const voices = window.speechSynthesis.getVoices();
            selectedVoice = voices.find(v => v.lang === 'en-US' && v.name.toLowerCase().includes('google'))
                         || voices.find(v => v.lang === 'en-US')
                         || voices[0];
        }
        window.speechSynthesis.onvoiceschanged = loadVoices;
        if (window.speechSynthesis.getVoices().length > 0) loadVoices();

        function escapeString(str) { return (str || '').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'\\"'); }

        document.addEventListener('DOMContentLoaded', () => {
            generateCategoryFilters();
            updateCounts();
            updateStreakBadge();
            setDailyWord();
            applyFilters();

            document.getElementById('searchInput').addEventListener('input', e => {
                if (viewingSaved || viewingLearned) exitSpecialView();
                currentSearchQuery = e.target.value;
                applyFilters();
            });

            window.addEventListener('scroll', () => {
                document.getElementById('scrollTop').classList.toggle('show', window.scrollY > 400);
            });

            window.addEventListener('languageChanged', () => {
                displayCurrentPage();
                updatePagination();
            });
        });

        function updateStreakBadge() { document.getElementById('streakNum').textContent = streak.count; }

        function setDailyWord() {
            const all = getAllWords();
            if (!all.length) return;
            dailyWord = all[Math.floor(Date.now() / 86400000) % all.length];
            document.getElementById('dailyWordText').textContent = dailyWord.word;
            document.getElementById('dailyWordAr').textContent   = dailyWord.arabic;
        }

        function playDailyWord()  { if (dailyWord) playWord(dailyWord.word); }
        function learnDailyWord() { if (dailyWord) { markLearned(dailyWord.id); showToast(t('toast-daily'), 'success'); } }

        function generateCategoryFilters() {
            const cats = new Set();
            for (const lvl in WORDS_DATA) WORDS_DATA[lvl].forEach(w => w.category && cats.add(w.category));
            const emojiMap = { 'تحيات':'👋','منزل':'🏠','عائلة':'👨‍👩‍👧','طعام':'🍔','تسوق':'🛒','مواصلات':'🚗','صحة':'🏥','عمل':'💼','تعليم':'📚','وقت':'⏰','ملابس':'👕','اتجاهات':'🗺️','مشاعر':'😊','أفعال':'🏃','تكنولوجيا':'📱' };
            const container = document.getElementById('categoryFilters');
            container.innerHTML = `<button class="filter-tab category-tab active" onclick="filterByCategory('all')">${t('ft-all')}</button>`;
            [...cats].sort().forEach(cat => {
                const emoji = emojiMap[cat] || '';
                container.innerHTML += `<button class="filter-tab category-tab" onclick="filterByCategory('${cat}')">${emoji ? emoji + ' ' : ''}${cat}</button>`;
            });
        }

        function getAllWords() { return [...WORDS_DATA.beginner, ...WORDS_DATA.intermediate, ...WORDS_DATA.advanced]; }

        function updateCounts() {
            const total = getAllWords().length;
            document.getElementById('totalWords').textContent   = total;
            document.getElementById('savedCount').textContent   = savedWords.length;
            document.getElementById('learnedCount').textContent = learnedWords.length;
            document.getElementById('savedBadge').textContent   = savedWords.length;
            document.getElementById('learnedBadge').textContent = learnedWords.length;
        }

        function toggleStats() {
            const panel = document.getElementById('statsPanel');
            const isHidden = panel.style.display === 'none';
            panel.style.display = isHidden ? 'block' : 'none';
            if (isHidden) updateStatsPanel();
        }

        function updateStatsPanel() {
            const total   = getAllWords().length;
            const learned = learnedWords.length;
            const pct     = total ? Math.round((learned / total) * 100) : 0;
            let rank = t('rank-beginner');
            if (pct >= 80)      rank = t('rank-expert');
            else if (pct >= 50) rank = t('rank-advanced');
            else if (pct >= 25) rank = t('rank-intermediate');

            document.getElementById('sp-learned').textContent = learned;
            document.getElementById('sp-streak').textContent  = streak.count;
            document.getElementById('sp-today').textContent   = todayLearned.count;
            document.getElementById('sp-saved').textContent   = savedWords.length;
            document.getElementById('sp-pct').textContent     = pct + '%';
            document.getElementById('sp-rank').textContent    = rank;

            const levels = [ { key: 'beginner', label: t('lvl-beginner') }, { key: 'intermediate', label: t('lvl-intermediate') }, { key: 'advanced', label: t('lvl-advanced') } ];
            document.getElementById('levelProgress').innerHTML = levels.map(lvl => {
                const words  = WORDS_DATA[lvl.key] || [];
                const done   = words.filter(w => learnedWords.includes(w.id)).length;
                const lvlPct = words.length ? Math.round((done / words.length) * 100) : 0;
                return `
                    <div style="display: flex; align-items: center; gap: 0.75rem;">
                        <span style="font-size: 0.8rem; font-weight: 600; opacity: 0.9; min-width: 52px;">${lvl.label}</span>
                        <div style="flex: 1; height: 7px; background: rgba(255,255,255,0.2); border-radius: 100px; overflow: hidden;"><div style="height: 100%; border-radius: 100px; background: white; transition: width 0.8s ease; width:${lvlPct}%"></div></div>
                        <span style="font-size: 0.75rem; font-weight: 700; min-width: 35px; text-align: left; opacity: 0.9;">${lvlPct}%</span>
                    </div>`;
            }).join('');
        }

        function filterByLevel(level) {
            exitSpecialView();
            currentLevel = level;
            document.querySelectorAll('#levelFilters .filter-tab').forEach(t => t.classList.remove('active'));
            const idMap = { all:'ft-all', beginner:'ft-beg', intermediate:'ft-int', advanced:'ft-adv' };
            document.getElementById(idMap[level])?.classList.add('active');
            applyFilters();
        }

        function filterByCategory(cat) {
            exitSpecialView();
            currentCategory = cat;
            document.querySelectorAll('#categoryFilters .filter-tab').forEach(t => {
                const txt = t.textContent.replace(/\p{Emoji}/gu, '').trim();
                t.classList.toggle('active', txt === cat || (cat === 'all' && (txt === 'الكل' || txt === 'All')));
            });
            applyFilters();
        }

        function applyFilters() {
            let words = currentLevel === 'all' ? getAllWords() : (WORDS_DATA[currentLevel] || []);
            if (currentCategory !== 'all') words = words.filter(w => w.category === currentCategory);
            if (currentSearchQuery.length >= 1) {
                const q = currentSearchQuery.toLowerCase();
                words = words.filter(w => w.word.toLowerCase().includes(q) || w.arabic.includes(q));
            }
            currentDisplayWords = words;
            currentPage = 1;
            displayCurrentPage();
            updatePagination();
        }

        function displayCurrentPage() {
            const grid = document.getElementById('wordsGrid');
            if (!currentDisplayWords.length) {
                grid.innerHTML = `<div class="no-results"><i class="fas fa-search" style="font-size:2rem;margin-bottom:0.5rem;display:block;"></i>${t('no-results')}</div>`;
                document.getElementById('paginationContainer').style.display = 'none';
                return;
            }
            document.getElementById('paginationContainer').style.display = 'flex';
            const start     = (currentPage - 1) * itemsPerPage;
            const end       = Math.min(start + itemsPerPage, currentDisplayWords.length);
            const pageWords = currentDisplayWords.slice(start, end);

            grid.innerHTML = pageWords.map(item => {
                const isSaved   = savedWords.includes(item.id);
                const isLearned = learnedWords.includes(item.id);
                const ew = escapeString(item.word);
                return `
                <div class="cl-card word-card ${isSaved ? 'saved' : ''} ${isLearned ? 'learned' : ''}" style="padding: 1.3rem;">
                    <span class="learned-ribbon" style="position: absolute; top: 10px; left: 10px; background: var(--gradient); color: white; font-size: 0.66rem; font-weight: 700; padding: 0.18rem 0.55rem; border-radius: 100px; display: ${isLearned ? 'inline-block' : 'none'};">${t('card-ribbon')}</span>
                    <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.7rem;">
                        <span style="font-size: 1.75rem; font-weight: 800; color: var(--primary); line-height: 1;">${item.word}</span>
                        <span style="font-size: 1rem; color: var(--text-secondary); background: var(--bg-secondary); padding: 0.2rem 0.65rem; border-radius: 2rem; font-weight: 600;">${item.arabic}</span>
                    </div>
                    <div style="background: var(--bg-secondary); padding: 0.38rem 0.85rem; border-radius: 2rem; font-size: 0.8rem; margin-bottom: 0.8rem; width: fit-content; color: var(--text-secondary);"><i class="fas fa-microphone-alt"></i> ${item.pronunciation}</div>
                    <div style="background: var(--bg-secondary); padding: 0.8rem 1rem; border-radius: 0.85rem; margin-bottom: 0.85rem; border-right: 3px solid var(--primary);">
                        <div style="font-weight: 600; font-size: 0.9rem; color: var(--text-primary);">"${item.example}"</div>
                        <div style="color: var(--text-secondary); font-size: 0.83rem; margin-top: 0.3rem;">${item.exampleArabic}</div>
                    </div>
                    <div class="card-actions">
                        <button class="action-btn listen" onclick="playWord('${ew}')"><i class="fas fa-volume-up"></i> ${t('card-listen')}</button>
                        <button class="action-btn listen-slow" onclick="playWordSlow('${ew}')"><i class="fas fa-ear-listen"></i> ${t('card-slow')}</button>
                        <button class="action-btn save-btn ${isSaved ? 'active' : ''}" onclick="toggleSave(${item.id})">
                            <i class="fas fa-bookmark"></i> ${isSaved ? t('card-unsave') : t('card-save')}
                        </button>
                        <button class="action-btn learn-btn ${isLearned ? 'active' : ''}" onclick="markLearned(${item.id})">
                            <i class="fas fa-${isLearned ? 'check-circle' : 'graduation-cap'}"></i>
                            ${isLearned ? t('card-learned') : t('card-learn')}
                        </button>
                    </div>
                </div>`;
            }).join('');

            document.getElementById('pageInfo').textContent = `${t('pageInfo')} ${start + 1}-${end} ${t('pageInfoOf')} ${currentDisplayWords.length} ${t('pageInfoWord')}`;
        }

        function updatePagination() {
            totalPages = Math.ceil(currentDisplayWords.length / itemsPerPage);
            document.getElementById('prevBtn').disabled = currentPage === 1;
            document.getElementById('nextBtn').disabled = currentPage === totalPages;
            const pn = document.getElementById('pageNumbers');
            pn.innerHTML = '';
            const s = Math.max(1, currentPage - 2);
            const e = Math.min(totalPages, currentPage + 2);
            if (s > 1) { addPageBtn(pn, 1); if (s > 2) addDots(pn); }
            for (let i = s; i <= e; i++) addPageBtn(pn, i);
            if (e < totalPages) { if (e < totalPages - 1) addDots(pn); addPageBtn(pn, totalPages); }
        }

        function addPageBtn(container, num) {
            const btn = document.createElement('button');
            btn.className = `page-number ${num === currentPage ? 'active' : ''}`;
            btn.textContent = num;
            btn.onclick = () => goToPage(num);
            container.appendChild(btn);
        }

        function addDots(container) {
            const s = document.createElement('span');
            s.className = 'page-number';
            s.textContent = '...';
            s.style.cssText = 'border:none;cursor:default;opacity:0.4;';
            container.appendChild(s);
        }

        function changePage(dir) {
            if (dir === 'prev' && currentPage > 1) currentPage--;
            else if (dir === 'next' && currentPage < totalPages) currentPage++;
            displayCurrentPage(); updatePagination();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function goToPage(page) {
            currentPage = page;
            displayCurrentPage(); updatePagination();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function toggleSave(id) {
            const wasSaved = savedWords.includes(id);
            savedWords = wasSaved ? savedWords.filter(x => x !== id) : [...savedWords, id];
            localStorage.setItem('savedWords', JSON.stringify(savedWords));
            updateCounts();
            showToast(wasSaved ? t('toast-unsaved') : t('toast-saved'), wasSaved ? 'warning' : 'success');
            viewingSaved ? showSavedWords() : displayCurrentPage();
        }

        function markLearned(id) {
            const wasLearned = learnedWords.includes(id);
            if (!wasLearned) {
                learnedWords = [...learnedWords, id];
                const today = new Date().toDateString();
                todayLearned.count = (todayLearned.date === today) ? todayLearned.count + 1 : 1;
                todayLearned.date  = today;
                const yesterday = new Date(Date.now() - 86400000).toDateString();
                if (streak.lastDate !== today) {
                    streak.count = (streak.lastDate === yesterday) ? streak.count + 1 : 1;
                    streak.lastDate = today;
                    updateStreakBadge();
                    localStorage.setItem('streak', JSON.stringify(streak));
                }
                localStorage.setItem('todayLearned', JSON.stringify(todayLearned));
                showToast(t('toast-learned'), 'success');
            } else {
                learnedWords = learnedWords.filter(x => x !== id);
                showToast(t('toast-unlearned'), 'info');
            }
            localStorage.setItem('learnedWords', JSON.stringify(learnedWords));
            updateCounts();
            updateStatsPanel();
            viewingLearned ? showLearnedWords() : displayCurrentPage();
        }

        function showSavedWords() {
            viewingSaved = true; viewingLearned = false;
            const words = getAllWords().filter(w => savedWords.includes(w.id));
            if (!words.length) {
                document.getElementById('wordsGrid').innerHTML = `<div class="empty-saved"><i class="fas fa-bookmark"></i><h3>${t('empty-saved-h')}</h3><p>${t('empty-saved-p')}</p><button class="back-btn" onclick="exitSpecialView()"><i class="fas fa-arrow-right"></i> ${t('btn-back')}</button></div>`;
                document.getElementById('paginationContainer').style.display = 'none'; return;
            }
            currentDisplayWords = words; currentPage = 1;
            displayCurrentPage(); updatePagination();
        }

        function showLearnedWords() {
            viewingLearned = true; viewingSaved = false;
            const words = getAllWords().filter(w => learnedWords.includes(w.id));
            if (!words.length) {
                document.getElementById('wordsGrid').innerHTML = `<div class="empty-saved"><i class="fas fa-graduation-cap"></i><h3>${t('empty-learned-h')}</h3><p>${t('empty-learned-p')}</p><button class="back-btn" onclick="exitSpecialView()"><i class="fas fa-arrow-right"></i> ${t('btn-back')}</button></div>`;
                document.getElementById('paginationContainer').style.display = 'none'; return;
            }
            currentDisplayWords = words; currentPage = 1;
            displayCurrentPage(); updatePagination();
        }

        function exitSpecialView() { viewingSaved = false; viewingLearned = false; applyFilters(); }

        function playWord(word) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(word);
            u.lang = 'en-US'; u.rate = 1.0; u.pitch = 1.0; u.volume = 1;
            if (selectedVoice) u.voice = selectedVoice;
            window.speechSynthesis.speak(u);
        }

        function playWordSlow(word) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(word);
            u.lang = 'en-US'; u.rate = 0.5; u.pitch = 1.1; u.volume = 1;
            if (selectedVoice) u.voice = selectedVoice;
            window.speechSynthesis.speak(u);
        }

        function showToast(msg, type = 'info') {
            const tc = document.getElementById('toastContainer');
            const t  = document.createElement('div');
            t.className = `toast ${type}`;
            t.innerHTML = `<i class="fas fa-${type === 'success' ? 'check' : type === 'warning' ? 'times' : 'info-circle'}"></i> ${msg}`;
            tc.appendChild(t);
            setTimeout(() => { t.style.animation = 'toastOut 0.3s ease forwards'; setTimeout(() => t.remove(), 300); }, 2200);
        }
    </script>
</body>             
</html>
