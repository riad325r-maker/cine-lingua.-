<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineLingua | الكلمات والجمل</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem; }
        .page-header h1 { font-size: 2.5rem; background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .stats-badge { display: flex; gap: 1rem; background-color: white; padding: 0.75rem 1.5rem; border-radius: var(--radius-full); border: 1px solid var(--border); }
        [data-theme="dark"] .stats-badge { background: var(--bg-card); border-color: var(--border-light); }
        .search-box { max-width: 600px; margin: 0 auto 2rem; position: relative; }
        .search-box input { width: 100%; padding: 1rem 1rem 1rem 3rem; border: 2px solid var(--border); border-radius: var(--radius-full); background: white; font-size: 1rem; transition: var(--transition); }
        [data-theme="dark"] .search-box input { background: var(--bg-card); border-color: var(--border-light); color: var(--text-primary); }
        .search-box i { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--gray); }
        .filter-section { display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; align-items: center; }
        .level-tabs { display: flex; gap: 0.5rem; background: white; padding: 0.5rem; border-radius: var(--radius-full); border: 1px solid var(--border); }
        [data-theme="dark"] .level-tabs { background: var(--bg-card); border-color: var(--border-light); }
        .level-tab { padding: 0.75rem 1.5rem; border: none; background: transparent; border-radius: var(--radius-full); cursor: pointer; font-weight: 600; color: var(--gray); transition: var(--transition); }
        .level-tab.active { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; }
        .words-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 1.5rem; }
        .word-card { background: white; border-radius: var(--radius-lg); padding: 1.5rem; box-shadow: var(--shadow); border: 2px solid transparent; transition: var(--transition); cursor: pointer; }
        [data-theme="dark"] .word-card { background: var(--bg-card); }
        .word-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); border-color: var(--primary); }
        .word-card.saved { border-color: var(--success); background: linear-gradient(135deg, rgba(22, 163, 74, 0.05), rgba(34, 197, 94, 0.1)); }
        .word-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .word-text { font-size: 2rem; font-weight: 800; color: var(--primary); }
        .word-arabic { font-size: 1.25rem; color: var(--gray); background: #f1f5f9; padding: 0.25rem 0.75rem; border-radius: var(--radius-full); }
        [data-theme="dark"] .word-arabic { background: var(--bg-secondary); color: var(--text-secondary); }
        .word-pronunciation { background: #f1f5f9; padding: 0.5rem 1rem; border-radius: var(--radius-full); font-size: 0.875rem; margin: 1rem 0; width: fit-content; color: var(--gray); }
        [data-theme="dark"] .word-pronunciation { background: var(--bg-secondary); color: var(--text-secondary); }
        .word-example { background: #f8fafc; padding: 1rem; border-radius: var(--radius-md); margin: 1rem 0; border-right: 4px solid var(--primary); }
        [data-theme="dark"] .word-example { background: var(--bg-secondary); }
        .word-actions { display: flex; gap: 0.5rem; margin-top: 1rem; }
        .action-btn { flex: 1; padding: 0.75rem; border: none; border-radius: var(--radius-md); background: #f1f5f9; color: var(--dark); cursor: pointer; transition: var(--transition); display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
        [data-theme="dark"] .action-btn { background: var(--bg-secondary); color: var(--text-primary); }
        .action-btn:hover { background: var(--primary); color: white; }
        .action-btn.saved { background: var(--success); color: white; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo"><i class="fas fa-film"></i><span>CineLingua</span></div>
            <ul class="nav-menu">
                <li><a href="index.html">الرئيسية</a></li>
                <li><a href="lessons.html" class="active">الكلمات</a></li>
                <li><a href="stories.html">القصص</a></li>
                <li><a href="quiz.html">الاختبارات</a></li>
            </ul>
            <div class="theme-toggle" id="themeToggle">
                <button class="theme-btn active" onclick="setTheme('light')"><i class="fas fa-sun"></i></button>
                <button class="theme-btn" onclick="setTheme('dark')"><i class="fas fa-moon"></i></button>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1>📚 تعلم الكلمات والجمل</h1>
            <div class="stats-badge">
                <span><i class="fas fa-book"></i> <span id="totalWords">0</span> كلمة</span>
                <span><i class="fas fa-bookmark"></i> <span id="savedCount">0</span> محفوظة</span>
            </div>
        </div>

        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="ابحث عن كلمة...">
        </div>

        <div class="filter-section">
            <div class="level-tabs">
                <button class="level-tab active" onclick="loadLevel('beginner')">مبتدئ</button>
                <button class="level-tab" onclick="loadLevel('intermediate')">متوسط</button>
                <button class="level-tab" onclick="loadLevel('advanced')">متقدم</button>
            </div>
        </div>

        <div class="words-grid" id="wordsGrid"></div>
    </div>

    <script src="words-data.js"></script>
    <script src="translations.js"></script>
    <script src="theme.js"></script>
    <script>
        let savedWords = JSON.parse(localStorage.getItem('savedWords')) || [];
        let currentLevel = 'beginner';
        let currentWords = [];

        document.addEventListener('DOMContentLoaded', () => {
            updateTotalWords();
            loadLevel('beginner');
        });

        function updateTotalWords() {
            const total = (WORDS_DATA.beginner?.length || 0) + (WORDS_DATA.intermediate?.length || 0) + (WORDS_DATA.advanced?.length || 0);
            document.getElementById('totalWords').textContent = total;
            document.getElementById('savedCount').textContent = savedWords.length;
        }

        function loadLevel(level) {
            currentLevel = level;
            document.querySelectorAll('.level-tab').forEach(tab => tab.classList.remove('active'));
            event.target.classList.add('active');
            
            currentWords = getWordsByLevel(level);
            displayWords(currentWords);
        }

        function displayWords(words) {
            const grid = document.getElementById('wordsGrid');
            grid.innerHTML = words.map(item => {
                const isSaved = savedWords.includes(item.id);
                return `
                    <div class="word-card ${isSaved ? 'saved' : ''}">
                        <div class="word-header">
                            <span class="word-text">${item.word}</span>
                            <span class="word-arabic">${item.arabic}</span>
                        </div>
                        <div class="word-pronunciation"><i class="fas fa-microphone-alt"></i> ${item.pronunciation}</div>
                        <div class="word-example">
                            <div>"${item.example}"</div>
                            <div class="example-arabic">${item.exampleArabic}</div>
                        </div>
                        <div class="word-actions">
                            <button class="action-btn" onclick="playWord('${item.word}')"><i class="fas fa-volume-up"></i> استماع</button>
                            <button class="action-btn ${isSaved ? 'saved' : ''}" onclick="toggleSave(${item.id})">
                                <i class="fas ${isSaved ? 'fa-bookmark' : 'fa-bookmark-o'}"></i> ${isSaved ? 'محفوظة' : 'حفظ'}
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function playWord(word) {
            const utterance = new SpeechSynthesisUtterance(word);
            utterance.lang = 'en-US';
            window.speechSynthesis.speak(utterance);
        }

        function toggleSave(wordId) {
            if (savedWords.includes(wordId)) {
                savedWords = savedWords.filter(id => id !== wordId);
            } else {
                savedWords.push(wordId);
            }
            localStorage.setItem('savedWords', JSON.stringify(savedWords));
            document.getElementById('savedCount').textContent = savedWords.length;
            displayWords(currentWords);
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const query = e.target.value;
            if (query.length < 2) { displayWords(currentWords); return; }
            const results = searchWords(query);
            displayWords(results);
        });
    </script>
</body>
</html>
